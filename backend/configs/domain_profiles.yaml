# config/domain_profiles.yaml
# ============================================================
# 각 도메인의 특성, 용어, 제약 조건 템플릿을 정의
# 새 도메인 추가 시 이 파일에 항목만 추가하면 됨
# ============================================================

aviation:
  display_name: "항공 승무원 스케줄링"
  icon: "✈️"
  description: "항공사 객실/운항 승무원의 비행 스케줄 최적화"

  # 도메인 감지용 키워드 (컬럼명, 시트명, 데이터 내용에서 탐색)
  detection_keywords:
    - "flight"
    - "비행"
    - "airport"
    - "공항"
    - "cabin"
    - "객실"
    - "운항"
    - "편명"
    - "flight_no"
    - "departure"
    - "arrival"
    - "layover"
    - "체류"
    - "pairing"
    - "페어링"
    - "duty_time"
    - "block_time"
    - "deadhead"

  # 도메인 특화 용어 매핑
  terminology:
    crew: "승무원 (객실/운항)"
    shift: "페어링 (Pairing) / 듀티 (Duty)"
    route: "노선 (Route / Leg)"
    rest: "체류 (Layover) / 휴식"
    base: "베이스 공항 (Home Base)"

  # 일반적인 제약 조건 템플릿
  typical_constraints:
    hard:
      - "연속 비행 시간 제한 (Flight Time Limitation)"
      - "듀티 타임 상한 (Max Duty Time)"
      - "최소 휴식 시간 (Minimum Rest Period)"
      - "자격 요건 (Aircraft Type Qualification)"
      - "베이스 출발/복귀 (Base Return)"
    soft:
      - "선호 노선 배정"
      - "공평한 비행 시간 분배"
      - "시차 고려 (Jet Lag Minimization)"
      - "연속 야간 비행 최소화"

  # 일반적인 목적 함수
  typical_objectives:
    - "총 인건비 최소화"
    - "데드헤드(Deadhead) 최소화"
    - "비행 시간 공평 분배"
    - "체류 비용 최소화"

  # 관련 규정
  regulations:
    - "항공안전법 (Aviation Safety Act)"
    - "ICAO FTL (Flight Time Limitations)"
    - "국토교통부 승무원 근무시간 기준"


