# ============================================================
# Column Generator 튜닝 파라미터 기본값 (도메인 무관)
# ============================================================
# 이 파일은 코드 변경 없이 튜닝 가능한 엔진 내부 파라미터입니다.
# 사용자 운영 제약(max_driving_minutes 등)은 parameters.csv에서 설정합니다.
#
# 우선순위: params(사용자) > domain YAML > 이 파일 > dataclass 기본값
# ============================================================

# ── Beam Search ──────────────────────────────────────────────
beam_width: 50
max_columns_target: 100000
time_group_minutes: 120          # 시간대 그룹 너비 (분)
span_estimate_multiplier: 1.5    # 조기 pruning 배율

# ── Beam Score 가중치 ────────────────────────────────────────
task_count_score_weight: 100     # trip 수 보너스 (score 단위)
depth_bonus_score: 50            # min_column_depth 달성 보너스

# ── Cost 가중치 ──────────────────────────────────────────────
idle_cost_weight: 0.02           # 대기시간 비용 계수
overhead_cost_weight: 0.01       # (span - driving) 비용 계수
short_column_cost_weight: 0.05   # 짧은 column 페널티 계수
depth_penalty_cost_weight: 0.3   # min_depth 미달 페널티 계수
greedy_cost_multiplier: 1.5      # greedy fallback column 비용 배율
fallback_cost: 10.0              # single-task fallback column 비용

# ── Diversity (Adaptive CG) ──────────────────────────────────
diversity_weight: 100.0          # pair-frequency penalty 가중치

# ── Block Combine (block-gap-block 구조) ────────────────────
# 기본: 비활성화. 도메인별 config에서 enabled: true로 override.
block_combine_enabled: false     # block 결합 활성화 여부
block_combine_max_gap: 0         # 0=max_idle_time(params)에서 자동 도출
block_combine_per_block: 5       # block당 최대 결합 수 (안정성 cap)
block_combine_score_penalty: 0.7 # score의 wait penalty 계수 (순수 튜닝 — 도출 불가)
block_combine_top_k: 0           # 0=max_columns_target*0.3에서 자동 도출
block_combine_max_active_ratio: 0.5  # block active ≤ max_active * ratio
block_combine_min_trips: 2       # block 결합 최소 trip 수

# ── Diversity ──────────────────────────────────────────────
min_per_diversity_bucket: 5      # beam diversity 최소 bucket 크기

# ── Single Task Fallback ──────────────────────────────────
single_task_max_windows: 1       # single task 2nd pass window 수
fallback_include_pause: true     # fallback column에 min_pause 포함

# ── 시간 상수 ─────────────────────────────────────────────
day_minutes: 1440                # 1일 분 (26시간제 등 대비)
