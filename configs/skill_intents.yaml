# ============================================================
# 스킬별 내부 Intent 정의
# ============================================================
# SkillIntentClassifier가 이 설정을 읽어 LLM 프롬프트를 구성한다.
#
# 각 스킬의 intent:
#   description: LLM에게 전달할 intent 설명
#   examples: 대표 사용자 메시지 예시 (LLM few-shot)
#   extract_params: LLM이 추출할 파라미터 목록 (optional)
#
# button_actions: Fast-Path 매칭용 (정확한 문자열 → intent)
#   state_condition: 이 버튼이 활성화되는 상태 조건 (optional)
# ============================================================

problem_definition:
  intents:
    confirm:
      description: "사용자가 현재 제안된 문제 정의를 승인/확정"
      examples:
        - "확인"
        - "좋습니다"
        - "이대로 진행"
        - "ok"
        - "approve"
        - "네"
        - "승인"

    change_objective:
      description: "목적함수를 다른 것으로 변경하고 싶다는 요청"
      examples:
        - "목적함수를 승무원 최소화로 변경"
        - "목적함수 바꾸고 싶어"
        - "objective to minimize crew count"
        - "승무원 수 최소화로 바꿔주세요"
        - "목적함수를 바꾸고 진행하고 싶습니다"
      extract_params: [target_objective, extra_instructions]

    change_category:
      description: "특정 제약조건의 Hard/Soft 카테고리를 변경"
      examples:
        - "no_overlap soft로 변경"
        - "change max_stay to hard"
        - "night_rest를 hard로 바꿔"
        - "이 제약을 소프트로 전환해줘"
      extract_params: [constraint_name, target_category]

    set_parameter:
      description: "파라미터 값을 직접 설정 또는 수정"
      examples:
        - "day_crew_count = 32"
        - "야간 승무원 8명"
        - "max_work_time: 480"
        - "숙박조입니다"
      extract_params: [param_name, param_value]

    add_constraint:
      description: "새로운 제약조건을 추가해달라는 요청"
      examples:
        - "연속 근무 3일 제한 추가해줘"
        - "야간 근무 후 최소 12시간 휴식 조건 추가"
      extract_params: [description]

    remove_constraint:
      description: "기존 제약조건을 제거해달라는 요청"
      examples:
        - "night_rest 제약 제거해줘"
        - "이 조건 빼줘"
        - "no_overlap 필요없어"
      extract_params: [constraint_name]

    modify_general:
      description: "구체적 항목 미지정. 수정하고 싶다는 일반적 의사 표현 (무엇을 수정할지 추가 질문 필요)"
      examples:
        - "수정할게 있어"
        - "조정하고 싶어"
        - "변경"

    restart:
      description: "문제 정의를 처음부터 다시 시작"
      examples:
        - "다시 시작"
        - "리셋"
        - "처음부터"
        - "reset"

    cancel:
      description: "현재 진행 중인 작업(목적함수 변경 확인 등)을 취소"
      examples:
        - "취소"
        - "cancel"
        - "그만"
        - "안할래"

    question:
      description: "수정 의도 없이 정보를 질문하거나 설명을 요청"
      examples:
        - "이 제약조건이 뭔가요?"
        - "왜 Hard로 설정되었나요?"
        - "목적함수 뭐가 있나요?"
        - "night_rest가 뭔지 설명해줘"

  button_actions:
    "확인": confirm
    "승인": confirm
    "ok": confirm
    "수정": modify_general
    "다시 분석": restart
    "취소": cancel
    "cancel": cancel

math_model:
  intents:
    confirm:
      description: "수학 모델을 확정하고 다음 단계로 진행"
      examples:
        - "확정"
        - "확인"
        - "이 모델로 진행"
        - "맞습니다"

    regenerate:
      description: "수학 모델을 다시 생성해달라는 요청"
      examples:
        - "다시 생성해줘"
        - "재생성"
        - "모델 다시 만들어줘"

    modify:
      description: "수학 모델의 특정 부분 수정 요청"
      examples:
        - "이 제약식 수정해줘"
        - "변수 추가해줘"

    question:
      description: "수학 모델에 대한 질문"
      examples:
        - "이 수식이 맞나요?"
        - "변수가 뭘 의미하나요?"

  button_actions:
    "확정": confirm
    "확인": confirm
    "다시": regenerate
    "재생성": regenerate

analyze:
  intents:
    analyze:
      description: "데이터 분석 실행 또는 새 분석 시작"
      examples:
        - "분석해줘"
        - "데이터 분석 시작"
        - "analyze"

    reanalyze:
      description: "이전 분석을 무시하고 다시 분석"
      examples:
        - "다시 분석해줘"
        - "재분석"
        - "reanalyze"

    question:
      description: "분석 결과에 대한 질문"
      examples:
        - "이 데이터가 뭔가요?"
        - "어떤 컬럼이 있나요?"

  button_actions:
    "다시 분석해줘": reanalyze
    "재분석": reanalyze

solver:
  intents:
    auto:
      description: "자동으로 최적 솔버를 추천받겠다는 의사"
      examples:
        - "자동으로 추천해줘"
        - "알아서 선택해줘"

    priority_accuracy:
      description: "정확도 우선 솔버 추천"
      examples:
        - "정확도 우선"
        - "accuracy"
        - "정확도를 우선시해줘"

    priority_speed:
      description: "속도 우선 솔버 추천"
      examples:
        - "속도 우선"
        - "speed"
        - "빠른 솔버"
        - "빠르게"

    priority_cost:
      description: "비용 우선 솔버 추천"
      examples:
        - "비용 우선"
        - "cost"
        - "저렴한 솔버"

    question:
      description: "솔버에 대한 질문"
      examples:
        - "어떤 솔버가 있나요?"
        - "CQM이 뭔가요?"

  button_actions:
    "정확도 우선으로 솔버 추천해줘": priority_accuracy
    "속도 우선으로 솔버 추천해줘": priority_speed
    "비용 우선으로 솔버 추천해줘": priority_cost
    "솔버 다시 추천해줘": auto
