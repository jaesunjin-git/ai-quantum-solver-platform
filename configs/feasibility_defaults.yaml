# ============================================================
# Column Feasibility Check 기본값 (플랫폼 공통)
# ============================================================
# 모든 도메인에 공통 적용되는 기본 feasibility check.
# 도메인별 YAML이 존재하면 이 파일을 완전히 대체함 (merge 아님).
#
# 설계 원칙:
#   - 이 파일은 "어떤 check가 존재하는가" (카탈로그)
#   - 파라미터 값은 _param 접미사로 참조 → 고객 params에서 주입
#   - action은 도메인 기본값, 고객별로 action_param으로 override 가능
#   - constraint_ref: constraints.yaml의 제약 ID 참조 (추적성)
# ============================================================

feasibility_checks:
  # 유휴 대기시간 상한
  - type: max_value
    field: idle_minutes
    limit_param: max_idle_time
    action: reject

  # 활동시간 상한
  - type: max_value
    field: active_minutes
    limit_param: max_active_time
    action: reject

  # 실근무 경과시간 상한
  - type: max_value
    field: elapsed_minutes
    limit_param: max_span_time
    action: reject
