    - night
    resolution_priority: 6
    linking: {group: duty_boundary, requires: [], conflicts_with: []}
    big_m_strategy: none
    typical_range:
    - 360
    - 420
  day_duty_end:
    description: 주간 근무 종료 시각 제한
    expression_template: duty_end[j] <= day_duty_end_latest + big_m * is_night[j]
