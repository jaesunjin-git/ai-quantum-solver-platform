    linking: {group: crew_count, requires: [crew_activation_linking], conflicts_with: []}
    big_m_strategy: none
    category: hard

objectives:
  minimize_duties:
    type: minimize
    expression: sum(y[j] for j in J)
    description: 총 승무원(근무) 수 최소화
    description_ko: 승무원 수 최소화
    keywords: [최소화, 최소, 줄이, 줄여, 적게, 인원, 인력, minimize, minimum, fewer, reduce]
    crew_count_mode: upper_bound  # crew count → 상한(<=)
    required_constraints:
    - trip_coverage
    - crew_activation_linking
    - no_overlap
    recommended_hard:
    - max_driving_time
    - max_work_time
    recommended_soft:
    - workload_balance
    - avg_driving_time_target
    is_default: true
  minimize_duties_with_penalties:
    type: minimize
    expression: sum(y[j] for j in J) + sum(weight_k * slack_k for k in soft_constraints)
    description: 승무원 수 최소화 + soft 제약 위반 페널티
    description_ko: 승무원 수 최소화 (soft 페널티 포함)
    keywords: [최소화, 페널티, 위반, 패널티, soft, penalty, violation]
    required_constraints:
    - trip_coverage
    - crew_activation_linking
    - no_overlap
    recommended_hard:
    - max_driving_time
    - max_work_time
    recommended_soft:
    - workload_balance
    - avg_driving_time_target
    - avg_wait_time_target
    requires_soft: true
  maximize_efficiency:
    type: maximize
    expression: sum(trip_duration[i] * x[i,j] for i in I for j in J) / sum(duty_end[j]
      - duty_start[j] for j in J)
    description: 운전 효율(driving efficiency) 최대화
    description_ko: 운전 효율 최대화
    keywords: [효율, 효율성, 최대화, 운전효율, efficiency, maximize, productive]
    required_constraints:
    - trip_coverage
    - crew_activation_linking
    - no_overlap
    recommended_hard:
    - max_driving_time
    - max_work_time
    - max_wait_time
    recommended_soft:
    - avg_wait_time_target
    promote_to_hard:
    - max_total_stay_time
  balance_workload:
    type: minimize
    expression: sum(y[j] for j in J)
    description: 승무원 수 고정 + 업무량 균형 최적화
    description_ko: 업무량 균형 최적화
    keywords: [균형, 공평, 배분, 균등, 골고루, 형평, 나눠, 나누, balance, fair, distribute, equitable, equal]
    crew_count_mode: exact  # crew count → 등호(==)
    required_constraints:
    - trip_coverage
    - crew_activation_linking
    - no_overlap
    recommended_hard:
    - max_driving_time
    - max_work_time
    promote_to_hard:
    - workload_balance
    - fixed_day_crew_count
    - fixed_night_crew_count
    - fixed_total_duties
    recommended_soft:
    - avg_driving_time_target
