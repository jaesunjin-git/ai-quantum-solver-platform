auxiliary_variables:
  duty_start:
    type: continuous
    indices:
    - J
    description: duty j 시작시각(분)
  duty_end:
    type: continuous
    indices:
    - J
    description: duty j 종료시각(분)
  is_night:
    type: binary
    indices:
    - J
    description: duty j 야간 여부
constraint_templates:
  trip_coverage:
    expression: sum(x[i,j] for j in J) == 1
    for_each: i in I
    description: 각 운행 i는 정확히 하나의 duty j에 배정
  max_driving_time:
    expression: sum(trip_duration[i] * x[i,j] for i in I) <= max_driving_minutes
    for_each: j in J
    description: duty j에 배정된 운행들의 운전시간 합 <= 300분
  max_work_time:
    expression: preparation_minutes * y[j] + sum(trip_duration[i] * x[i,j] for i in
      I) + cleanup_minutes * y[j] <= max_work_minutes
    for_each: j in J
    description: duty j의 총 구속시간(준비+운전+정리) <= 660분
  mandatory_break:
    expression: duty_end[j] - duty_start[j] - sum(trip_duration[i] * x[i,j] for i
      in I) >= min_break_minutes * y[j]
    for_each: j in J
    description: duty span - 운전시간 >= 최소 휴식시간
  preparation_time:
    expression: duty_start[j] <= trip_dep_time[i] - preparation_minutes + big_m *
      (1 - x[i,j])
    for_each: i in I, j in J
    description: duty 시작은 배정된 모든 trip 출발 - 준비시간 이전
  cleanup_time:
    expression: duty_end[j] >= trip_arr_time[i] + cleanup_minutes - big_m * (1 - x[i,j])
    for_each: i in I, j in J
    description: duty 종료는 배정된 모든 trip 도착 + 정리시간 이후
  night_rest:
    expression: duty_end[j] - duty_start[j] <= 1440 - min_night_rest_minutes
    for_each: j in J
    description: duty span <= 1440 - 야간휴식시간 (하루 내 근무 제한)
  max_total_stay_time:
    expression: duty_end[j] - duty_start[j] <= max_total_stay_minutes
    for_each: j in J
    description: duty 총 체재시간 <= 720분
  big_m_constant:
    expression: 'CONSTANT: M = big_m (제약 아님, 다른 제약에서 참조)'
    for_each: ''
    description: Big-M 상수 정의
  qualification:
    expression: 'SKIP: 자격 데이터 없으면 생략 (모두 자격 있다고 가정)'
    for_each: ''
    description: 자격 제약 (데이터 없으면 생략)
  max_wait_time:
    expression: duty_end[j] - duty_start[j] - sum(trip_duration[i] * x[i,j] for i
      in I) - preparation_minutes * y[j] - cleanup_minutes * y[j] <= max_wait_minutes
    for_each: j in J
    description: duty 내 총 대기시간(span - 운전 - 준비 - 정리) <= 300분
  min_wait_time:
    expression: trip_dep_time[i2] - trip_arr_time[i1] >= min_wait_minutes - big_m
      * (2 - x[i1,j] - x[i2,j])
    for_each: (i1,i2) in overlap_pairs, j in J
    description: 같은 duty 내 연속 운행 간 최소 대기 >= 10분
  max_single_wait_time:
    expression: trip_dep_time[i2] - trip_arr_time[i1] <= max_single_wait_minutes +
      big_m * (2 - x[i1,j] - x[i2,j])
    for_each: (i1,i2) in overlap_pairs, j in J
    description: 같은 duty 내 연속 운행 간 1회 대기 <= 300분
  night_sleep_guarantee:
    expression: 1440 - duty_end[j] + duty_start[j] >= min_night_sleep_minutes * is_night[j]
    for_each: j in J
    description: 야간 duty 수면시간 >= 240분
  day_duty_start:
    expression: duty_start[j] >= day_duty_start_earliest * (1 - is_night[j])
    for_each: j in J
    description: 주간 duty 시작 >= 06:20
  day_duty_end:
    expression: duty_end[j] <= day_duty_end_latest + big_m * is_night[j]
    for_each: j in J
    description: 주간 duty 종료 <= 23:00
  night_duty_start:
    expression: duty_start[j] >= night_duty_start_earliest - big_m * (1 - is_night[j])
    for_each: j in J
    description: 야간 duty 시작 >= 18:00
  day_night_classification:
    expression: duty_start[j] >= night_threshold - big_m * (1 - is_night[j])
    for_each: j in J
    description: duty 시작 >= 22:00이면 야간 분류
  meal_break_guarantee:
    expression: duty_end[j] - duty_start[j] - sum(trip_duration[i] * x[i,j] for i
      in I) >= min_meal_break_minutes * y[j]
    for_each: j in J
    description: duty 내 비운전 시간 >= 식사 최소 휴식
domain: railway
