        - 출고
        - '17:00'
        - 최소
        context_must:
        - 야간
        - night
        context_exclude: []
        typical_range:
        - 960
        - 1050
    default_category: hard
    fixed_category: false
    note: 'hard: 최소 17:00 이후'
    detection_hints:
    - 야간 출고
    - 야간사업 출고
    - 야간근무 시작
    - night duty start
    - 야간 최소
    - '17:00'
    category: hard
    context_must:
    - 야간
    - night
    context_exclude:
