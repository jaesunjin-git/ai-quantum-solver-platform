    - 식사시간 보장
    - 점심
    - 식사 휴식
    resolution_priority: 5
    linking: {group: rest, requires: [], conflicts_with: []}
    big_m_strategy: none
    category: hard
    context_must:
    - 식사
    - meal
    - 점심
  day_duty_start:
    description: 주간 근무 시작 시각 제한
    expression_template: duty_start[j] >= day_duty_start_earliest * (1 - is_night[j])
    for_each: j in J
