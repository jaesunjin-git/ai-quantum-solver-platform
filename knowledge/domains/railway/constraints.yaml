version: '3.1'
domain: railway
description: 철도 승무원 스케줄링 제약조건 (범용 설계, 자동 분류 + 사용자 확인)
# ── v3.1 변경 (2026-03-25) ──
# 신규 선언 필드 3종 추가 (YAML만, 소비 코드는 후속):
#   resolution_priority: int (1-10) — INFEASIBLE 시 완화 순서. 낮을수록 먼저 완화.
#     원칙: 안전(9) > 법규(7-8) > 운영(5-6) > 사용자지정(4) > 효율/목표(1-2)
#     fixed_category=true인 구조적 제약은 null (완화 불가).
#   linking: {group, requires, conflicts_with} — 제약간 의존성 선언.
#   big_m_strategy: "none" | "indicator" | "horizon" — big-M 처리 전략.
#     indicator: CP-SAT OnlyEnforceIf로 변환 가능 (is_night 패턴).
#     horizon: time_axis 기반 동적 계산 (period × horizon_days).
category_rules:
  hard_keywords:
  - 이내
  - 이상
  - 이후
  - 이전
  - 확보
  - 반드시
  - 불가
  - 필수
  - must
  - shall
  - within
  - ensure
  soft_keywords:
  - 가급적
  - 노력
  - 권장
  - 최대한
  - 되도록
  - 바람직
  - prefer
  - target
  - recommend
  - aim
  force_hard_keywords:
  - 최소
  - 절대
  - 반드시
  - 필수
  - must
  - mandatory
  resolution_rules:
  - soft_keyword가 있으면 기본 SOFT
  - force_hard_keyword가 있으면 해당 값은 HARD
  - 'BOTH인 경우: _min 접미사 → HARD, _avg/_target → SOFT'
  - 확보+노력 조합 → SOFT
  - ambiguous → default_category 사용, 사용자 확인 요청
  semantic_id_patterns:
    hard:
    - _min$
    - _max_hard$
    - _earliest_min$
    - _latest_min$
    soft:
    - _avg$
    - _target$
    - _preferred$
    - _recommended$
  default_if_ambiguous: hard
variables:
  x:
    type: binary
    indices:
    - I
    - J
    description: 트립 i를 crew j에 배정
    aliases:
    - x[i,j]
    - x[i,d]
  y:
    type: binary
    indices:
    - J
    description: crew j 활성화 여부
    aliases:
    - y[j]
    - u[d]
  duty_start:
    type: integer
    indices:
    - J
    description: crew j의 근무 시작 시각 (분)
    aliases:
    - duty_start[j]
    - s[d]
  duty_end:
    type: integer
    indices:
    - J
    description: crew j의 근무 종료 시각 (분)
    aliases:
    - duty_end[j]
    - e[d]
    upper_bound: 1800
  is_night:
    type: binary
    indices:
    - J
    description: crew j의 야간 근무 여부
    aliases:
    - is_night[j]
    - n[d]

  # ── Duty Event 변수 (2026-03-19) ──
  # 도메인 의미: 각 duty의 첫 번째/마지막 trip 시각을 명시적으로 표현.
  # 컴파일러가 solver별 최적 방식으로 링킹 (CP-SAT: AddMinEquality/AddMaxEquality).
  first_trip_dep:
    type: integer
    indices:
    - J
    description: crew j에 할당된 첫 번째 trip의 출발 시각 (분)
    role: derived_event
    upper_bound: 1800
  last_trip_arr:
    type: integer
    indices:
    - J
    description: crew j에 할당된 마지막 trip의 도착 시각 (분)
    role: derived_event
    upper_bound: 1800
sets:
  I:
    description: 트립 집합
    source: trips.csv
    column: trip_id
  J:
    description: 근무/crew 집합
    source: range
    default_size: 96
  overlap_pairs:
    description: 시간 겹침 트립 쌍
    source: overlap_pairs.json
constraints:
  trip_coverage:
    description: 모든 트립은 정확히 하나의 crew에 배정
    expression_template: sum(x[i,j] for j in J) == 1
    for_each: i in I
    parameters: []
    default_category: hard
    fixed_category: true
    resolution_priority: null
    linking: {group: structural, requires: [], conflicts_with: []}
    big_m_strategy: none
    structured:
      lhs:
        type: sum
        variable: x
        sum_over: j
        indices:
        - i
        - j
      operator: ==
      rhs:
        type: constant
        value: 1
    detection_hints:
    - 운행 커버
    - trip coverage
    - 모든 열차
    - 배정
    category: hard
  crew_activation_linking:
    description: crew가 하나라도 트립을 담당하면 활성화
    expression_template: y[j] >= x[i,j]
    for_each: i in I, j in J
    parameters: []
    default_category: hard
    fixed_category: true
    resolution_priority: null
    linking: {group: structural, requires: [trip_coverage], conflicts_with: []}
    big_m_strategy: none
    structured:
      lhs:
        type: variable
        id: y
        indices:
        - j
      operator: '>='
      rhs:
        type: variable
        id: x
        indices:
        - i
        - j
    detection_hints:
    - 활성화
    - activation
    - crew link
    category: hard
  no_overlap:
    description: 시간 겹치는 트립은 같은 crew에 배정 금지
    expression_template: x[i1,j] + x[i2,j] <= 1
    for_each: (i1,i2) in overlap_pairs, j in J
    parameters: []
    default_category: hard
    fixed_category: true
    resolution_priority: null
    linking: {group: structural, requires: [], conflicts_with: []}
    big_m_strategy: none
    structured:
      lhs:
        type: sum
        terms:
        - type: variable
          id: x
          indices:
          - i1
          - j
        - type: variable
          id: x
          indices:
          - i2
          - j
      operator: <=
      rhs:
        type: constant
        value: 1
    detection_hints:
    - 중복
    - overlap
    - 겹침
    - 동시 배정
    category: hard
  max_driving_time:
    description: 1사업 최대 운전시간
    expression_template: sum(trip_duration[i] * x[i,j] for i in I) <= max_driving_minutes
      * y[j]
    for_each: j in J
    parameters:
    - max_driving_minutes
    default_category: hard
    fixed_category: false
    context_param: avg_driving_target_minutes
    structured:
      lhs:
        type: sum
        variable: x
        sum_over: i
        indices:
        - i
        - j
        coefficient: trip_duration[i]
      operator: <=
      rhs:
        type: product
        terms:
        - type: parameter
          id: max_driving_minutes
        - type: variable
          id: y
          indices:
          - j
    detection_hints:
    - 운전시간
    - driving time
    - 승무시간
    - 핸들타임
    - handle time
    - 최대 운전
    resolution_priority: 7
    linking: {group: driving_time, requires: [crew_activation_linking], conflicts_with: []}
    big_m_strategy: none
    category: hard
    context_must:
    - 이내
    - 이하
    - 최대
    context_exclude: []
    typical_range:
    - 340
    - 420
  avg_driving_time_target:
    description: 사업평균 운전시간 목표
    expression_template: sum(trip_duration[i] * x[i,j] for i in I) <= avg_driving_target_minutes
      * y[j]
    for_each: j in J
    parameters:
    - avg_driving_target_minutes
    default_category: soft
    fixed_category: false
    penalty_var: slack_avg_driving
    penalty_weight: 10
    detection_hints:
    - 평균 운전
    - avg driving
    - 평균 핸들
    - 운전시간 평균
    - 사업 평균 운전
    resolution_priority: 2
    linking: {group: driving_time, requires: [max_driving_time], conflicts_with: []}
    big_m_strategy: none
    category: soft
    context_must:
    - 평균
    - avg
    - 넘지 않게
    typical_range:
    - 250
    - 330
  max_work_time:
    description: 1사업 최대 근무시간 (구속시간) — 주간 전용, 야간은 overnight_work_time_excluding_sleep 적용
    expression_template: (duty_end[j] + 1440 * is_night[j]) - duty_start[j] <= max_work_minutes * y[j] + big_m * is_night[j]
    for_each: j in J
    parameters:
    - max_work_minutes
    default_category: hard
    fixed_category: false
    structured:
      lhs:
        type: subtract
        terms:
        - type: variable
          id: duty_end
          indices:
          - j
        - type: variable
          id: duty_start
          indices:
          - j
      operator: <=
      rhs:
        type: product
        terms:
        - type: parameter
          id: max_work_minutes
        - type: variable
          id: y
          indices:
          - j
    detection_hints:
    - 근무시간
    - work time
    - 구속시간
    - duty time
    - 근무시간 이내
    resolution_priority: 8
    linking: {group: work_time, requires: [crew_activation_linking], conflicts_with: [overnight_work_time_excluding_sleep]}
    big_m_strategy: indicator
    category: hard
    context_must:
    - 근무
    - work
    context_exclude: []
    typical_range:
    - 540
    - 720
  # ── max_wait_time: 순수 대기시간 = duty_span - 운전 - 준비 - 정리 - 휴식 - 수면(야간) ──
  # 대기시간 ≠ Non-Driving Time. 준비/정리는 근무, 식사/휴식은 공식 휴게, 수면은 숙박조 보장.
  # 주간/야간은 준비·정리 파라미터가 다르므로 분리하되, 수식 구조는 동일.

  max_wait_time_day:
    description: 주간사업 최대 대기시간 (순수 유휴시간만)
    expression_template: >
      ((duty_end[j] + 1440 * is_night[j]) - duty_start[j]
      - sum(trip_duration[i] * x[i,j] for i in I)
      - preparation_minutes_departure * y[j]
      - cleanup_minutes_arrival * y[j]
      - min_break_minutes * y[j])
      <= max_wait_minutes * y[j] + big_m * is_night[j]
    for_each: j in J
    parameters:
    - max_wait_minutes
    - preparation_minutes_departure
    - cleanup_minutes_arrival
    - min_break_minutes
    - big_m
    default_category: hard
    fixed_category: false
    context_param: max_wait_minutes
    detection_hints:
    - 대기시간
    - wait time
    - 대기 최대
    - waiting
    - 최대 대기
    category: hard
    context_must:
    - 대기
    - wait
    context_exclude:
    - 평균
    - avg
    typical_range:
    - 180
    - 360
    resolution_priority: 5
    linking: {group: wait_time, requires: [crew_activation_linking], conflicts_with: []}
    big_m_strategy: indicator
    note: "주간(is_night=0) 적용. 순수 대기 = span - 운전 - 출고준비(60) - 입고정리(40) - 휴식(30)"

  max_wait_time_night:
    description: 야간(숙박조) 최대 대기시간 (순수 유휴시간만)
    expression_template: >
      ((duty_end[j] + 1440 * is_night[j]) - duty_start[j]
      - sum(trip_duration[i] * x[i,j] for i in I)
      - preparation_minutes_night * y[j]
      - cleanup_minutes_night * y[j]
      - min_break_minutes * y[j]
      - min_night_sleep_minutes * is_night[j])
      <= max_wait_minutes * y[j] + big_m * (1 - is_night[j])
    for_each: j in J
    activation_condition: params.get('is_overnight_crew', {}).get('value') == True
    parameters:
    - max_wait_minutes
    - preparation_minutes_night
    - cleanup_minutes_night
    - min_break_minutes
    - min_night_sleep_minutes
    - big_m
    default_category: hard
    fixed_category: false
    context_param: max_wait_minutes
    detection_hints:
    - 야간 대기시간
    - night wait
    - 숙박조 대기
    category: hard
    context_must:
    - 대기
    - wait
    typical_range:
    - 180
    - 360
    resolution_priority: 5
    linking: {group: wait_time, requires: [day_night_classification], conflicts_with: []}
    big_m_strategy: indicator
    note: "야간(is_night=1) 적용. 순수 대기 = span - 운전 - 익일출고준비(50) - 당일입고정리(30) - 휴식(30) - 수면(240)"
  avg_wait_time_target:
    description: 사업평균 대기시간 목표 (순수 유휴시간 기준)
    expression_template: >
      ((duty_end[j] + 1440 * is_night[j]) - duty_start[j]
      - sum(trip_duration[i] * x[i,j] for i in I)
      - preparation_minutes_departure * y[j]
      - cleanup_minutes_arrival * y[j]
      - min_break_minutes * y[j]
      - min_night_sleep_minutes * is_night[j])
      <= avg_wait_target_minutes * y[j]
    for_each: j in J
    parameters:
      avg_wait_target_minutes:
        description: 사업 평균 실대기 시간 목표
        detection_hints:
        - 평균 대기
        - avg wait
        - 실대기
        - 평균 실대기
        context_must:
        - 평균
        - 실대기
        typical_range:
        - 120
        - 240
      recognized_wait_minutes:
        description: 사업당 인정대기시간 (고정값)
        detection_hints:
        - 인정대기
        - 인정 대기
        - 고정값
        context_must:
        - 인정
        typical_range:
        - 120
        - 240
    default_category: soft
    fixed_category: false
    penalty_var: slack_avg_wait
    penalty_weight: 5
    detection_hints:
    - 평균 대기
    - avg wait
    - 대기시간 평균
    - 실대기 시간
    - 평균 실대기
    - 인정대기
    - 인정 대기
    category: soft
    context_must:
    - 평균
    - avg
    - 인정
    resolution_priority: 2
    linking: {group: wait_time, requires: [], conflicts_with: []}
    big_m_strategy: none
    note: "순수 대기 = span - 운전 - 준비(주간값) - 정리(주간값) - 휴식 - 수면(야간 자동차감). soft이므로 주간 prep/cleanup 기준(보수적)."
  max_total_stay_time:
    description: 1사업 최대 체재시간
    expression_template: (duty_end[j] + 1440 * is_night[j]) - duty_start[j] + preparation_minutes + cleanup_minutes
      <= max_total_stay_minutes * y[j]
    for_each: j in J
    parameters:
      max_total_stay_minutes:
        description: 최대 체류시간
        typical_range:
        - 600
        - 780
      preparation_minutes_relay:
        description: 준비시간 (기본값 사용)
      cleanup_minutes_relay:
        description: 정리시간 (기본값 사용)
    default_category: soft
    fixed_category: false
    penalty_var: slack_total_stay
    penalty_weight: 8
    context_param: max_total_stay_minutes
    detection_hints:
    - 체류시간
    - 체재시간
    - 총 체재
    - total stay
    - 회사 내 체류
    resolution_priority: 3
    linking: {group: stay_time, requires: [crew_activation_linking], conflicts_with: []}
    big_m_strategy: none
    category: hard
    context_must:
    - 체류
    - 체재
    - stay
    typical_range:
    - 600
    - 780
  # ── Duty Event 기반 prep/cleanup (2026-03-19 리팩토링) ──
  # 준비/정리는 duty 시작/종료 시 1회만 발생하는 이벤트.
  # first_trip_dep[j], last_trip_arr[j] event 변수를 사용하여
  # duty_start/end를 등식으로 고정 (solver slack 방지).
  # 컴파일러가 first/last 링킹을 solver별 최적 방식으로 자동 생성.

  preparation_time:
    description: 출고 준비 — duty 시작 시 1회 (첫 trip 출발 전 준비)
    expression_template: duty_start[j] == first_trip_dep[j] - preparation_minutes
    for_each: j in J
    event_based: true
    parameters:
      preparation_minutes_relay:
        description: 승계/편승 출무시 준비시간
        detection_hints: [승계, 편승, 출무]
        context_must: [출무]
        context_exclude: [종무]
        typical_range: [30, 50]
      preparation_minutes_departure:
        description: 출고(출무시) 준비시간
        detection_hints: [출고, 출무시]
        context_must: [출고, 출무]
        context_exclude: [사업중, 야간]
        typical_range: [50, 70]
      preparation_minutes_mid_duty:
        description: 출고(사업중) 준비시간
        detection_hints: [출고, 사업중]
        context_must: [사업중]
        typical_range: [40, 60]
    default_category: hard
    fixed_category: true
    detection_hints: [출근, 준비시간, preparation, 사전점검, 출근점호]
    category: hard
    typical_range: [20, 60]
    resolution_priority: null
    linking: {group: duty_boundary, requires: [], conflicts_with: []}
    big_m_strategy: none
    note: "duty_start = first_trip_dep - prep (등식). 컴파일러가 first_trip_dep 링킹 자동 생성."

  cleanup_time:
    description: 입고 정리 — duty 종료 시 1회 (마지막 trip 도착 후 정리)
    expression_template: duty_end[j] == last_trip_arr[j] + cleanup_minutes
    for_each: j in J
    event_based: true
    parameters:
      cleanup_minutes_relay:
        description: 승계/편승 종무시 정리시간
        detection_hints: [승계, 편승, 종무]
        context_must: [종무]
        context_exclude: [출무, 입고]
        typical_range: [20, 40]
      cleanup_minutes_arrival:
        description: 입고(종무시) 정리시간
        detection_hints: [입고, 종무시, 종무]
        context_must: [입고]
        context_exclude: [사업중, 승계, 편승]
        typical_range: [30, 50]
      cleanup_minutes_mid_duty:
        description: 입고(사업중) 정리시간
        detection_hints: [입고, 사업중]
        context_must: [사업중]
        typical_range: [20, 40]
    default_category: hard
    fixed_category: true
    detection_hints: [정리시간, cleanup, 퇴근점호]
    category: hard
    typical_range: [20, 60]
    resolution_priority: null
    linking: {group: duty_boundary, requires: [], conflicts_with: []}
    big_m_strategy: none
    note: "duty_end = last_trip_arr + cleanup (등식). 컴파일러가 last_trip_arr 링킹 자동 생성."
  mandatory_break:
    description: 필수 휴식시간
    expression_template: ((duty_end[j] + 1440 * is_night[j]) - duty_start[j]) - sum(trip_duration[i] * x[i,j]
      for i in I) >= min_break_minutes * y[j]
    for_each: j in J
    parameters:
    - min_break_minutes
    default_category: hard
    fixed_category: false
    structured:
      lhs:
        type: subtract
        terms:
        - type: subtract
          terms:
          - type: variable
            id: duty_end
            indices:
            - j
          - type: variable
            id: duty_start
            indices:
            - j
        - type: sum
          variable: x
          sum_over: i
          indices:
          - i
          - j
          coefficient: trip_duration[i]
      operator: '>='
      rhs:
        type: product
        terms:
        - type: parameter
          id: min_break_minutes
        - type: variable
          id: y
          indices:
          - j
    detection_hints:
    - 휴식
    - break
    - 식사시간
    - 쉬는 시간
    - rest
    resolution_priority: 6
    linking: {group: rest, requires: [crew_activation_linking], conflicts_with: []}
