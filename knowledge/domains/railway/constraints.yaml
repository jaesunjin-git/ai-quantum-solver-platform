version: '3.0'
domain: railway
description: 철도 승무원 스케줄링 제약조건 (범용 설계, 자동 분류 + 사용자 확인)
category_rules:
  hard_keywords:
  - 이내
  - 이상
  - 이후
  - 이전
  - 확보
  - 반드시
  - 불가
  - 필수
  - must
  - shall
  - within
  - ensure
  soft_keywords:
  - 가급적
  - 노력
  - 권장
  - 최대한
  - 되도록
  - 바람직
  - prefer
  - target
  - recommend
  - aim
  force_hard_keywords:
  - 최소
  - 절대
  - 반드시
  - 필수
  - must
  - mandatory
  resolution_rules:
  - soft_keyword가 있으면 기본 SOFT
  - force_hard_keyword가 있으면 해당 값은 HARD
  - 'BOTH인 경우: _min 접미사 → HARD, _avg/_target → SOFT'
  - 확보+노력 조합 → SOFT
  - ambiguous → default_category 사용, 사용자 확인 요청
  semantic_id_patterns:
    hard:
    - _min$
    - _max_hard$
    - _earliest_min$
    - _latest_min$
    soft:
    - _avg$
    - _target$
    - _preferred$
    - _recommended$
  default_if_ambiguous: hard
variables:
  x:
    type: binary
    indices:
    - I
    - J
    description: 트립 i를 crew j에 배정
    aliases:
    - x[i,j]
    - x[i,d]
  y:
    type: binary
    indices:
    - J
    description: crew j 활성화 여부
    aliases:
    - y[j]
    - u[d]
  duty_start:
    type: integer
    indices:
    - J
    description: crew j의 근무 시작 시각 (분)
    aliases:
    - duty_start[j]
    - s[d]
  duty_end:
    type: integer
    indices:
    - J
    description: crew j의 근무 종료 시각 (분)
    aliases:
    - duty_end[j]
    - e[d]
    upper_bound: 1800
  is_night:
    type: binary
    indices:
    - J
    description: crew j의 야간 근무 여부
    aliases:
    - is_night[j]
    - n[d]
sets:
  I:
    description: 트립 집합
    source: trips.csv
    column: trip_id
  J:
    description: 근무/crew 집합
    source: range
    default_size: 96
  overlap_pairs:
    description: 시간 겹침 트립 쌍
    source: overlap_pairs.json
constraints:
  trip_coverage:
    description: 모든 트립은 정확히 하나의 crew에 배정
    expression_template: sum(x[i,j] for j in J) == 1
    for_each: i in I
    parameters: []
    default_category: hard
    fixed_category: true
    structured:
      lhs:
        type: sum
        variable: x
        sum_over: j
        indices:
        - i
        - j
      operator: ==
      rhs:
        type: constant
        value: 1
    detection_hints:
    - 운행 커버
    - trip coverage
    - 모든 열차
    - 배정
    category: hard
  crew_activation_linking:
    description: crew가 하나라도 트립을 담당하면 활성화
    expression_template: y[j] >= x[i,j]
    for_each: i in I, j in J
    parameters: []
    default_category: hard
    fixed_category: true
    structured:
      lhs:
        type: variable
        id: y
        indices:
        - j
      operator: '>='
      rhs:
        type: variable
        id: x
        indices:
        - i
        - j
    detection_hints:
    - 활성화
    - activation
    - crew link
    category: hard
  no_overlap:
    description: 시간 겹치는 트립은 같은 crew에 배정 금지
    expression_template: x[i1,j] + x[i2,j] <= 1
    for_each: (i1,i2) in overlap_pairs, j in J
    parameters: []
    default_category: hard
    fixed_category: true
    structured:
      lhs:
        type: sum
        terms:
        - type: variable
          id: x
          indices:
          - i1
          - j
        - type: variable
          id: x
          indices:
          - i2
          - j
      operator: <=
      rhs:
        type: constant
        value: 1
    detection_hints:
    - 중복
    - overlap
    - 겹침
    - 동시 배정
    category: hard
  max_driving_time:
    description: 1사업 최대 운전시간
    expression_template: sum(trip_duration[i] * x[i,j] for i in I) <= max_driving_minutes
      * y[j]
    for_each: j in J
    parameters:
    - max_driving_minutes
    default_category: hard
    fixed_category: false
    context_param: avg_driving_target_minutes
    structured:
      lhs:
        type: sum
        variable: x
        sum_over: i
        indices:
        - i
        - j
        coefficient: trip_duration[i]
      operator: <=
      rhs:
        type: product
        terms:
        - type: parameter
          id: max_driving_minutes
        - type: variable
          id: y
          indices:
          - j
    detection_hints:
    - 운전시간
    - driving time
    - 승무시간
    - 핸들타임
    - handle time
    - 최대 운전
    category: hard
    context_must:
    - 이내
    - 이하
    - 최대
    context_exclude: []
    typical_range:
    - 340
    - 420
  avg_driving_time_target:
    description: 사업평균 운전시간 목표
    expression_template: sum(trip_duration[i] * x[i,j] for i in I) <= avg_driving_target_minutes
      * y[j]
    for_each: j in J
    parameters:
    - avg_driving_target_minutes
    default_category: soft
    fixed_category: false
    penalty_var: slack_avg_driving
    penalty_weight: 10
    detection_hints:
    - 평균 운전
    - avg driving
    - 평균 핸들
    - 운전시간 평균
    - 사업 평균 운전
    category: soft
    context_must:
    - 평균
    - avg
    - 넘지 않게
    typical_range:
    - 250
    - 330
  max_work_time:
    description: 1사업 최대 근무시간 (구속시간)
    expression_template: duty_end[j] - duty_start[j] <= max_work_minutes * y[j]
    for_each: j in J
    parameters:
    - max_work_minutes
    default_category: hard
    fixed_category: false
    structured:
      lhs:
        type: subtract
        terms:
        - type: variable
          id: duty_end
          indices:
          - j
        - type: variable
          id: duty_start
          indices:
          - j
      operator: <=
      rhs:
        type: product
        terms:
        - type: parameter
          id: max_work_minutes
        - type: variable
          id: y
          indices:
          - j
    detection_hints:
    - 근무시간
    - work time
    - 구속시간
    - duty time
    - 근무시간 이내
    category: hard
    context_must:
    - 근무
    - work
    context_exclude: []
    typical_range:
    - 540
    - 720
  max_wait_time:
    description: 1사업 최대 대기시간
    expression_template: (duty_end[j] - duty_start[j] - sum(trip_duration[i] * x[i,j]
      for i in I)) <= max_wait_minutes * y[j]
    for_each: j in J
    parameters:
    - max_wait_minutes
    default_category: hard
    fixed_category: false
    context_param: max_wait_minutes
    detection_hints:
    - 대기시간
    - wait time
    - 대기 최대
    - waiting
    - 최대 대기
    category: hard
    context_must:
    - 대기
    - wait
    context_exclude:
    - 평균
    - avg
    typical_range:
    - 180
    - 360
  avg_wait_time_target:
    description: 사업평균 대기시간 목표
    expression_template: (duty_end[j] - duty_start[j] - sum(trip_duration[i] * x[i,j]
      for i in I)) <= avg_wait_target_minutes * y[j]
    for_each: j in J
    parameters:
      avg_wait_target_minutes:
        description: 사업 평균 실대기 시간 목표
        detection_hints:
        - 평균 대기
        - avg wait
        - 실대기
        - 평균 실대기
        context_must:
        - 평균
        - 실대기
        typical_range:
        - 120
        - 240
      recognized_wait_minutes:
        description: 사업당 인정대기시간 (고정값)
        detection_hints:
        - 인정대기
        - 인정 대기
        - 고정값
        context_must:
        - 인정
        typical_range:
        - 120
        - 240
    default_category: soft
    fixed_category: false
    penalty_var: slack_avg_wait
    penalty_weight: 5
    detection_hints:
    - 평균 대기
    - avg wait
    - 대기시간 평균
    - 실대기 시간
    - 평균 실대기
    - 인정대기
    - 인정 대기
    category: soft
    context_must:
    - 평균
    - avg
    - 인정
  max_total_stay_time:
    description: 1사업 최대 체재시간
    expression_template: duty_end[j] - duty_start[j] + preparation_minutes + cleanup_minutes
      <= max_total_stay_minutes * y[j]
    for_each: j in J
    parameters:
      max_total_stay_minutes:
        description: 최대 체류시간
        typical_range:
        - 600
        - 780
      preparation_minutes_relay:
        description: 준비시간 (기본값 사용)
      cleanup_minutes_relay:
        description: 정리시간 (기본값 사용)
    default_category: soft
    fixed_category: false
    penalty_var: slack_total_stay
    penalty_weight: 8
    context_param: max_total_stay_minutes
    detection_hints:
    - 체류시간
    - 체재시간
    - 총 체재
    - total stay
    - 회사 내 체류
    category: hard
    context_must:
    - 체류
    - 체재
    - stay
    typical_range:
    - 600
    - 780
  preparation_time:
    description: 승무 전 준비시간
    expression_template: duty_start[j] <= trip_dep_time[i] - preparation_minutes +
      big_m * (1 - x[i,j])
    for_each: i in I, j in J
    parameters:
      preparation_minutes_relay:
        description: 승계/편승 출무시 준비시간
        detection_hints:
        - 승계
        - 편승
        - 출무
        context_must:
        - 출무
        context_exclude:
        - 종무
        typical_range:
        - 30
        - 50
      preparation_minutes_departure:
        description: 출고(출무시) 준비시간
        detection_hints:
        - 출고
        - 출무시
        context_must:
        - 출고
        - 출무
        context_exclude:
        - 사업중
        - 야간
        - '18:00'
        - '17:00'
        typical_range:
        - 50
        - 70
      preparation_minutes_mid_duty:
        description: 출고(사업중) 준비시간
        detection_hints:
        - 출고
        - 사업중
        context_must:
        - 사업중
        typical_range:
        - 40
        - 60
    default_category: hard
    fixed_category: true
    structured:
      lhs:
        type: variable
        id: duty_start
        indices:
        - j
      operator: <=
      rhs:
        type: expression
        expr: trip_dep_time[i] - preparation_minutes + big_m * (1 - x[i,j])
    detection_hints:
    - 출근
    - 준비시간
    - preparation
    - 사전점검
    - 출근점호
    category: hard
    typical_range:
    - 20
    - 60
  cleanup_time:
    description: 승무 후 정리시간
    expression_template: duty_end[j] >= trip_arr_time[i] + cleanup_minutes - big_m
      * (1 - x[i,j])
    for_each: i in I, j in J
    parameters:
      cleanup_minutes_relay:
        description: 승계/편승 종무시 정리시간
        detection_hints:
        - 승계
        - 편승
        - 종무
        context_must:
        - 종무
        context_exclude:
        - 출무
        - 입고
        typical_range:
        - 20
        - 40
      cleanup_minutes_arrival:
        description: 입고(종무시) 정리시간
        detection_hints:
        - 입고
        - 종무시
        - 종무
        context_must:
        - 입고
        context_exclude:
        - 사업중
        - 승계
        - 편승
        typical_range:
        - 30
        - 50
      cleanup_minutes_mid_duty:
        description: 입고(사업중) 정리시간
        detection_hints:
        - 입고
        - 사업중
        context_must:
        - 사업중
        typical_range:
        - 20
        - 40
    default_category: hard
    fixed_category: true
    structured:
      lhs:
        type: variable
        id: duty_end
        indices:
        - j
      operator: '>='
      rhs:
        type: expression
        expr: trip_arr_time[i] + cleanup_minutes - big_m * (1 - x[i,j])
    detection_hints:
    - 정리시간
    - cleanup
    - 퇴근점호
    category: hard
    typical_range:
    - 20
    - 60
  mandatory_break:
    description: 필수 휴식시간
    expression_template: (duty_end[j] - duty_start[j]) - sum(trip_duration[i] * x[i,j]
      for i in I) >= min_break_minutes * y[j]
    for_each: j in J
    parameters:
    - min_break_minutes
    default_category: hard
    fixed_category: false
    structured:
      lhs:
        type: subtract
        terms:
        - type: subtract
          terms:
          - type: variable
            id: duty_end
            indices:
            - j
          - type: variable
            id: duty_start
            indices:
            - j
        - type: sum
          variable: x
          sum_over: i
          indices:
          - i
          - j
          coefficient: trip_duration[i]
      operator: '>='
      rhs:
        type: product
        terms:
        - type: parameter
          id: min_break_minutes
        - type: variable
          id: y
          indices:
          - j
    detection_hints:
    - 휴식
    - break
    - 식사시간
    - 쉬는 시간
    - rest
    category: hard
    context_exclude:
    - 식사
    - meal
    - 수면
    - 야간
    - 취침
  meal_break_guarantee:
    description: 식사시간 보장
    expression_template: (duty_end[j] - duty_start[j]) - sum(trip_duration[i] * x[i,j]
      for i in I) >= min_meal_break_minutes * y[j]
    for_each: j in J
    parameters:
    - min_meal_break_minutes
    default_category: hard
    fixed_category: false
    detection_hints:
    - 식사 보장
    - meal break
    - 식사시간 보장
    - 점심
    - 식사 휴식
    category: hard
    context_must:
    - 식사
    - meal
    - 점심
  day_duty_start:
    description: 주간 근무 시작 시각 제한
    expression_template: duty_start[j] >= day_duty_start_earliest * (1 - is_night[j])
    for_each: j in J
    parameters:
    - day_duty_start_earliest
    default_category: hard
    fixed_category: false
    detection_hints:
    - 주간 출고
    - 주간 첫 출고
    - 주간근무 시작
    - day duty start
    - 06:20
    category: hard
    context_must:
    - 주간
    - day
    context_exclude:
    - 야간
    - night
    typical_range:
    - 360
    - 420
  day_duty_end:
    description: 주간 근무 종료 시각 제한
    expression_template: duty_end[j] <= day_duty_end_latest + big_m * is_night[j]
    for_each: j in J
    parameters:
    - day_duty_end_latest
    - big_m
    default_category: hard
    fixed_category: false
    detection_hints:
    - 퇴근시간
    - 최종 퇴근
    - 주간 종료
    - day duty end
    - '23:00'
    category: hard
    context_must:
    - 퇴근
    - 종료
    - 이전
    - end
    context_exclude:
    - 야간
    - night
    typical_range:
    - 1320
    - 1440
  night_duty_start:
    description: 야간 근무 최소 시작 시각 (hard 한계)
    expression_template: duty_start[j] >= night_duty_start_earliest * is_night[j]
    for_each: j in J
    # 숙박조 패턴이 아닌 경우에만 적용 (숙박조는 전날 저녁 입고)
    activation_condition: "params.get('is_overnight_crew', {}).get('value') is not True"
    parameters:
      night_duty_start_earliest:
        description: 야간 최소 출고시간 (17:00)
        detection_hints:
        - 야간
        - 출고
        - '17:00'
        - 최소
        context_must:
        - 야간
        - night
        context_exclude: []
        typical_range:
        - 960
        - 1050
    default_category: hard
    fixed_category: false
    note: 'hard: 최소 17:00 이후'
    detection_hints:
    - 야간 출고
    - 야간사업 출고
    - 야간근무 시작
    - night duty start
    - 야간 최소
    - '17:00'
    category: hard
    context_must:
    - 야간
    - night
    context_exclude:
    - 가급적
    - 권장
    - 취침
    - 수면
    typical_range:
    - 960
    - 1140
  night_duty_start_preferred:
    description: 야간 근무 권장 시작 시각
    expression_template: duty_start[j] >= night_duty_start_preferred * is_night[j]
      - slack_night_start[j]
    for_each: j in J
    # 숙박조 패턴이 아닌 경우에만 적용
    activation_condition: "params.get('is_overnight_crew', {}).get('value') is not True"
    parameters:
      night_duty_start_preferred:
        description: 야간 권장 출고시간 (18:00)
        detection_hints:
        - 야간
        - 출고
        - '18:00'
        - 가급적
        context_must:
        - 야간
        - night
        context_exclude: []
        typical_range:
        - 1050
        - 1140
    default_category: soft
    fixed_category: false
    penalty_var: slack_night_start
    penalty_weight: 15
    note: 'soft: 가급적 18:00 이후'
    detection_hints:
    - 야간 가급적
    - 야간 출고 가급적
    - night preferred
    - 18:00 이후
    category: soft
    context_must:
    - 가급적
    - 권장
    - preferred
    typical_range:
    - 1020
    - 1140
  day_night_classification:
    description: 주간/야간 분류 기준
    expression_template: duty_start[j] >= night_threshold * is_night[j]
    for_each: j in J
    parameters:
    - night_threshold
    default_category: hard
    fixed_category: false
    detection_hints:
    - 주간 야간 구분
    - day night split
    - 숙박 구분
    - 주야 분리
    - 근무 구분
    category: hard
  night_sleep_guarantee:
    description: 야간 수면시간 보장
    expression_template: big_m * (1 - is_night[j]) + (duty_end[j] - duty_start[j])
      >= min_night_sleep_minutes * is_night[j]
    for_each: j in J
    # 숙박조 패턴인 경우에만 적용
    activation_condition: "params.get('is_overnight_crew', {}).get('value') == True"
    parameters:
    - min_night_sleep_minutes
    - big_m
    default_category: hard
    fixed_category: false
    detection_hints:
    - 취침시간
    - 수면시간
    - 수면 보장
    - 야간 수면
    - night sleep
    - 숙면 보장
    - 취침
    category: hard
    context_must:
    - 취침
    - 수면
    - sleep
    typical_range:
    - 180
    - 300
  night_rest:
    description: 야간 휴식시간 확보
    expression_template: (duty_end[j] - duty_start[j]) - sum(trip_duration[i]*x[i,j]
      for i in I) >= min_night_rest_total_minutes * is_night[j]
    for_each: j in J
    # 숙박조 패턴인 경우에만 적용
    activation_condition: "params.get('is_overnight_crew', {}).get('value') == True"
    parameters:
      min_night_rest_total_minutes:
        description: 야간 취침+준비정리 포함 총 확보시간
        detection_hints:
        - 확보 필요
        - 포함 시
        - 5시간 20분
        context_must:
        - 포함
        - 확보
        typical_range:
        - 280
        - 400
      cleanup_minutes_night:
        description: 야간 당일입고 정리시간
        detection_hints:
        - 당일입고
        context_must:
        - 당일입고
        typical_range:
        - 20
        - 40
      preparation_minutes_night:
        description: 야간 익일출고 준비시간
        detection_hints:
        - 익일출고
        context_must:
        - 익일출고
        typical_range:
        - 40
        - 60
    default_category: hard
    fixed_category: false
    detection_hints:
    - 야간 휴식
    - night rest
    - 숙박
    - 입고
    - 익일출고
    - 당일입고
    - 5시간 20분 확보
    category: hard
    context_must:
    - 입고
    - 출고
    - 숙박
    - 야간 휴식
    typical_range:
    - 280
    - 400

  # ── 숙박조 전용: 수면 제외 근무시간 ──
  overnight_work_time_excluding_sleep:
    description: 숙박조 근무시간 (수면시간 제외)
    expression_template: (duty_end[j] - duty_start[j]) - sleep_duration[j] <= max_work_minutes * is_night[j]
    for_each: j in J
    # 숙박조 + 수면시간을 근무에서 제외하는 경우에만 적용
    activation_condition: "params.get('is_overnight_crew', {}).get('value') == True and params.get('sleep_counts_as_work', {}).get('value') == False"
    parameters:
    - max_work_minutes
    default_category: hard
    fixed_category: false
    detection_hints:
    - 숙박조 근무시간
    - 수면 제외
    - 실근무시간
    - 숙박 근무
    - overnight work time
    category: hard
    context_must:
    - 숙박
    - 수면 제외
    typical_range:
    - 540
    - 720

  post_arrival_rest:
    description: 도착 후 휴식시간 확보
    expression_template: post_arrival_rest >= post_arrival_rest_minutes_min
    for_each: j in J
    parameters:
    - post_arrival_rest_minutes
    - post_arrival_rest_minutes_min
    default_category: soft
    fixed_category: false
    penalty_var: slack_post_rest
    penalty_weight: 5
    note: 2-3시간 확보 노력 (최소 1시간은 hard)
    detection_hints:
    - 강차 후 휴양
    - 퇴근 후 휴식
    - post shift rest
    - 휴양시간
    - 근무간 휴식
    category: soft
    context_must:
    - 강차
    - 휴양
    context_exclude:
    - 교육
    - training
    typical_range:
    - 60
    - 240
  post_shift_training:
    description: 퇴근 후 교육시간 확보
    expression_template: post_shift_free_time >= post_arrival_rest_minutes_2
    for_each: j in J
    parameters:
      post_trip_training_minutes:
        description: 강차 후 교육시간
        detection_hints:
        - 교육
        - training
        - 강차 후 교육
        context_must:
        - 교육
        - training
        typical_range:
        - 60
        - 180
    default_category: soft
    fixed_category: false
    penalty_var: slack_training
    penalty_weight: 3
    detection_hints:
    - 교육
    - training
    - 퇴근 후 교육
    - 강차 후 교육
    category: soft
    context_must:
    - 교육
    - training
    typical_range:
    - 60
    - 180
  workload_balance:
    description: crew간 트립 배분 균형
    expression_template: sum(x[i,j] for i in I) <= max_trips_per_crew * y[j]
    for_each: j in J
    parameters:
    - max_trips_per_crew
    default_category: soft
    fixed_category: false
    penalty_var: slack_balance
    penalty_weight: 5
    note: '자동 계산: ceil(|I|/target_crews) + margin'
    detection_hints:
    - 균형
    - balance
    - 공평
    - 편차
    category: soft

  # ── 승무원 인원 고정 제약 ──
  fixed_day_crew_count:
    description: 주간 근무 승무원 수 고정
    expression_template: "sum(y[j] * (1 - is_night[j]) for j in J) == day_crew_count"
    # 주간 승무원 수가 실제로 제공된 경우에만 활성화
    activation_condition: "params.get('day_crew_count', {}).get('value') is not None"
    structured:
      lhs: {sum: "y[j] * (1 - is_night[j])", for_each: "j in J"}
      operator: "=="
      rhs: {param: "day_crew_count"}
    for_each: ""
    parameters:
      day_crew_count:
        description: 주간 근무 승무원 수
        description_ko: 주간사업 인원
        default: null
        source: user_input_required
        typical_range: [10, 100]
        detection_hints:
        - 주간사업
        - 주간근무
        - 주간 인원
        - day crew
        - day shift
        context_must:
        - 주간
    fixed: false
    changeable: true
    name_ko: 주간 승무원 수 고정
    detection_hints:
    - 주간사업
    - 주간근무
    - 주간 인원
    - day crew count
    context_must:
    - 주간
    category: hard

  fixed_night_crew_count:
    description: 야간 근무 승무원 수 고정
    expression_template: "sum(y[j] * is_night[j] for j in J) == night_crew_count"
    # 야간 승무원 수가 실제로 제공된 경우에만 활성화
    activation_condition: "params.get('night_crew_count', {}).get('value') is not None"
    structured:
      lhs: {sum: "y[j] * is_night[j]", for_each: "j in J"}
      operator: "=="
      rhs: {param: "night_crew_count"}
    for_each: ""
    parameters:
      night_crew_count:
        description: 야간 근무 승무원 수
        description_ko: 야간사업 인원
        default: null
        source: user_input_required
        typical_range: [5, 50]
        detection_hints:
        - 야간사업
        - 야간근무
        - 야간 인원
        - night crew
        - night shift
        context_must:
        - 야간
    fixed: false
    changeable: true
    name_ko: 야간 승무원 수 고정
    detection_hints:
    - 야간사업
    - 야간근무
    - 야간 인원
    - night crew count
    context_must:
    - 야간
    category: hard

  fixed_total_duties:
    description: 총 사업(duty) 수 고정
    expression_template: "sum(y[j] for j in J) == total_duties"
    # 총 사업 수가 실제로 제공된 경우에만 활성화
    activation_condition: "params.get('total_duties', {}).get('value') is not None"
    structured:
      lhs: {sum: "y[j]", for_each: "j in J"}
      operator: "=="
      rhs: {param: "total_duties"}
    for_each: ""
    parameters:
      total_duties:
        description: 총 사업 수
        description_ko: 총 사업수
        default: null
        source: user_input_required
        typical_range: [20, 200]
        detection_hints:
        - 총 사업
        - 전체 사업
        - total duties
        - 사업수
    fixed: false
    changeable: true
    name_ko: 총 사업 수 고정
    detection_hints:
    - 총 사업
    - 사업수
    - total duties
    category: hard

objectives:
  minimize_duties:
    type: minimize
    expression: sum(y[j] for j in J)
    description: 총 승무원(근무) 수 최소화
    description_ko: 승무원 수 최소화
    keywords: [최소화, 최소, 줄이, 줄여, 적게, 인원, 인력, minimize, minimum, fewer, reduce]
    required_constraints:
    - trip_coverage
    - crew_activation_linking
    - no_overlap
    recommended_hard:
    - max_driving_time
    - max_work_time
    recommended_soft:
    - workload_balance
    - avg_driving_time_target
    is_default: true
  minimize_duties_with_penalties:
    type: minimize
    expression: sum(y[j] for j in J) + sum(weight_k * slack_k for k in soft_constraints)
    description: 승무원 수 최소화 + soft 제약 위반 페널티
    description_ko: 승무원 수 최소화 (soft 페널티 포함)
    keywords: [최소화, 페널티, 위반, 패널티, soft, penalty, violation]
    required_constraints:
    - trip_coverage
    - crew_activation_linking
    - no_overlap
    recommended_hard:
    - max_driving_time
    - max_work_time
    recommended_soft:
    - workload_balance
    - avg_driving_time_target
    - avg_wait_time_target
    requires_soft: true
  maximize_efficiency:
    type: maximize
    expression: sum(trip_duration[i] * x[i,j] for i in I for j in J) / sum(duty_end[j]
      - duty_start[j] for j in J)
    description: 운전 효율(driving efficiency) 최대화
    description_ko: 운전 효율 최대화
    keywords: [효율, 효율성, 최대화, 운전효율, efficiency, maximize, productive]
    required_constraints:
    - trip_coverage
    - crew_activation_linking
    - no_overlap
    recommended_hard:
    - max_driving_time
    - max_work_time
    - max_wait_time
    recommended_soft:
    - avg_wait_time_target
    promote_to_hard:
    - max_total_stay_time
  balance_workload:
    type: minimize
    expression: max(trips_per_crew) - min(trips_per_crew)
    description: 승무원 간 업무량 균형화
    description_ko: 업무량 균형 최적화
    keywords: [균형, 공평, 배분, 균등, 골고루, 형평, 나눠, 나누, balance, fair, distribute, equitable, equal]
    required_constraints:
    - trip_coverage
    - crew_activation_linking
    - no_overlap
    recommended_hard:
    - max_driving_time
    - max_work_time
    promote_to_hard:
    - workload_balance
    recommended_soft:
    - avg_driving_time_target
