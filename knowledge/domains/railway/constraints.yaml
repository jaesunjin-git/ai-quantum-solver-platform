    linking: {group: balance, requires: [], conflicts_with: []}
    big_m_strategy: none
    category: soft

  # ── 승무원 인원 고정 제약 ──
  fixed_day_crew_count:
    description: 주간 근무 승무원 수
    expression_template: "sum(y[j] * (1 - is_night[j]) for j in J) == day_crew_count"
    activation_condition: "params.get('day_crew_count', {}).get('value') is not None"
    applicable_objectives: all
    objective_operator_override:
      minimize_duties: "<="
      minimize_duties_with_penalties: "<="
      maximize_efficiency: "<="
      balance_workload: "=="
    rhs_source:
      minimize_duties: auto_or_param
      balance_workload: param_required
    structured:
      lhs: {sum: "y[j] * (1 - is_night[j])", for_each: "j in J"}
      operator: "=="
      rhs: {param: "day_crew_count"}
    for_each: ""
    parameters:
      day_crew_count:
        description: 주간 근무 승무원 수
        description_ko: 주간사업 인원
        default: null
        source: user_input_required
        typical_range: [10, 100]
        detection_hints:
        - 주간사업
        - 주간근무
        - 주간 인원
        - day crew
        - day shift
        context_must:
        - 주간
    fixed: false
    changeable: true
    name_ko: 주간 승무원 수 고정
    detection_hints:
    - 주간사업
    - 주간근무
    - 주간 인원
    - day crew count
    context_must:
    - 주간
    resolution_priority: 4
    linking: {group: crew_count, requires: [crew_activation_linking], conflicts_with: []}
    big_m_strategy: none
    category: hard

  fixed_night_crew_count:
    description: 야간 근무 승무원 수
    expression_template: "sum(y[j] * is_night[j] for j in J) == night_crew_count"
    activation_condition: "params.get('night_crew_count', {}).get('value') is not None"
    applicable_objectives: all
    objective_operator_override:
      minimize_duties: "<="
      minimize_duties_with_penalties: "<="
      maximize_efficiency: "<="
      balance_workload: "=="
    rhs_source:
      minimize_duties: auto_or_param
      balance_workload: param_required
    structured:
      lhs: {sum: "y[j] * is_night[j]", for_each: "j in J"}
      operator: "=="
      rhs: {param: "night_crew_count"}
    for_each: ""
    parameters:
