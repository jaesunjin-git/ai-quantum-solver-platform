    expression_template: "sum(y[j] for j in J) == total_duties"
    activation_condition: "params.get('total_duties', {}).get('value') is not None"
    applicable_objectives: all
    objective_operator_override:
      minimize_duties: "<="
      minimize_duties_with_penalties: "<="
      maximize_efficiency: "<="
      balance_workload: "=="
    rhs_source:
      minimize_duties: auto_or_param
      balance_workload: param_required
    structured:
      lhs: {sum: "y[j]", for_each: "j in J"}
      operator: "=="
      rhs: {param: "total_duties"}
    for_each: ""
    parameters:
      total_duties:
        description: 총 사업 수
        description_ko: 총 사업수
        default: null
        source: user_input_required
        typical_range: [20, 200]
        detection_hints:
