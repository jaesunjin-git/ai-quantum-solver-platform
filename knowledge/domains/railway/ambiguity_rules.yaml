# =============================================================================
# Ambiguity Detection Rules — Railway Domain
# =============================================================================
# 이 파일은 AmbiguityDetector 엔진이 평가하는 규칙을 정의합니다.
# 엔진은 도메인을 모르며, 이 YAML의 조건식과 질문만으로 동작합니다.
#
# 사용 가능한 변수:
#   phase1.*    — phase1_data (trip_count, min_time, max_time, avg_duration, stations, ...)
#   params.*    — _collect_parameters 결과 (각 파라미터의 value, source, ...)
#   facts.*     — state.data_facts (unique_counts, missing_values, ...)
#   phase1_summary.* — state.phase1_summary (timetable_trips, overlap_pairs, ...)
#
# 조건식: Python safe eval (비교, 논리연산, in, not in, is None)
# =============================================================================

rules:

  # ── 운영 패턴: 숙박조 (새벽 운행) ──
  overnight_crew_pattern:
    description: "새벽 시간대 운행이 감지되어 숙박조 운영 여부 확인 필요"
    importance: critical
    trigger:
      # 06:00(360분) 이전 출발 DIA 존재
      condition: "phase1.min_time is not None and phase1.min_time < 360"
      description: "06:00 이전 출발 DIA 존재"
    questions:
      - id: is_overnight
        text: "새벽 시간대({min_time_hhmm}) 출발 운행이 감지되었습니다. 전날 저녁 입고 후 숙박하는 야간 숙박조가 운행하나요?"
        text_vars:
          min_time_hhmm: "format_minutes(phase1.min_time)"
        type: yes_no
        on_yes:
          set_params:
            is_overnight_crew: {value: true, source: "user_clarification"}
          follow_up: [overnight_sleep, sleep_as_work]
        on_no:
          set_params:
            is_overnight_crew: {value: false, source: "user_clarification"}

      - id: overnight_sleep
        text: "숙박조의 최소 수면시간은 몇 시간인가요?"
        type: numeric
        unit: "시간"
        default: 6
        param: min_night_sleep_minutes
        transform: "value * 60"

      - id: sleep_as_work
        text: "숙박조의 수면시간은 근무시간에서 제외하나요?"
        type: yes_no
        on_yes:
          set_params:
            sleep_counts_as_work: {value: false, source: "user_clarification"}
        on_no:
          set_params:
            sleep_counts_as_work: {value: true, source: "user_clarification"}

  # ── 필수 파라미터 누락: 승무원 수 ──
  crew_count_missing:
    description: "주간/야간 승무원 수가 데이터에 없어 사용자 확인 필요"
    importance: critical
    trigger:
      condition: "params.get('day_crew_count', {}).get('source') is None and params.get('night_crew_count', {}).get('source') is None"
      description: "주간/야간 승무원 수 미제공"
    questions:
      - id: crew_counts
        text: "주간/야간 승무원 수가 데이터에서 확인되지 않았습니다. 지정해주세요."
        type: multi_input
        fields:
          - id: day_crew_count
            label: "주간 승무원 수"
            type: numeric
            required: true
          - id: night_crew_count
            label: "야간 승무원 수"
            type: numeric
            required: true

  # ── 값 범위 이상: typical_range 벗어남 ──
  param_out_of_range:
    description: "파라미터 값이 도메인 기준 범위를 벗어남"
    importance: high
    trigger:
      # 특수 트리거: 엔진이 모든 파라미터의 typical_range를 검사
      type: param_range_check
      description: "파라미터 값이 typical_range를 벗어남"
    questions:
      - id: confirm_range
        text: "'{param_name}'이(가) {value}{unit}로 설정됩니다. (일반 범위: {range_min}~{range_max}{unit}). 이 값이 맞나요?"
        type: yes_no
        dynamic: true
        on_no:
          action: request_input
          text: "올바른 값을 입력해주세요."
          param: "{param_name}"

  # ── 기본값 적용 확인: 중요 파라미터 ──
  important_default_confirmation:
    description: "중요 파라미터에 도메인 기본값이 적용됨"
    importance: high
    trigger:
      # 특수 트리거: 엔진이 importance=critical 파라미터 중 source가 reference_ranges인 것 검사
      type: default_value_check
      # 확인 대상 파라미터 목록 (source가 data가 아닌 것만)
      target_params:
        - night_duty_start_earliest
        - max_work_minutes
        - max_driving_minutes
        - night_threshold
    questions:
      - id: confirm_default
        text: "'{param_name}'이(가) 도메인 기본값 {value}{unit}로 설정됩니다. 맞나요?"
        type: yes_no
        dynamic: true
        on_no:
          action: request_input
          text: "올바른 값을 입력해주세요."
          param: "{param_name}"

  # ── 파라미터 간 충돌 ──
  dawn_trip_vs_night_start:
    description: "새벽 DIA와 야간 시작시각 설정이 충돌"
    importance: critical
    trigger:
      condition: "phase1.min_time is not None and phase1.min_time < 360 and params.get('night_duty_start_earliest', {}).get('value', 0) > 900"
      description: "새벽 DIA 존재하지만 야간 시작시각이 15:00 이후"
    # overnight_crew_pattern에서 숙박조=Yes로 답변한 경우 자동 해소
    suppressed_by: "overnight_crew_pattern.is_overnight:yes"
    questions:
      - id: resolve_conflict
        text: "새벽 {min_time_hhmm} 출발 DIA가 있지만, 야간 시작시각이 {night_start_hhmm}로 설정되어 있습니다. 어떻게 처리할까요?"
        text_vars:
          min_time_hhmm: "format_minutes(phase1.min_time)"
          night_start_hhmm: "format_minutes(params.get('night_duty_start_earliest', {}).get('value', 1020))"
        type: choice
        choices:
          - id: adjust_overnight
            label: "숙박조 패턴으로 조정"
            set_params:
              is_overnight_crew: {value: true, source: "user_clarification"}
          - id: keep_as_is
            label: "현재 설정 유지 (주간 조기출근)"
          - id: manual_input
            label: "야간 시작시각을 직접 입력"
            action: request_input
            param: night_duty_start_earliest

  # ── 총 사업 수(DIA) 누락 ──
  # 승무원 수가 확정된 경우 total_duties = day_crew_count + night_crew_count로 자동 결정 (1crew=1DIA)
  total_duties_missing:
    description: "총 사업 수가 데이터에서 확인되지 않음"
    importance: high
    trigger:
      condition: "params.get('total_duties', {}).get('source') is None and phase1.get('trip_count', 0) > 0 and params.get('day_crew_count', {}).get('value') is None"
      description: "총 사업 수 미제공 (승무원 수도 미확정)"
    questions:
      - id: total_duties
        text: "총 사업(DIA) 수가 데이터에서 확인되지 않았습니다. 총 {trip_count}개의 운행이 감지되었는데, 사업(DIA) 수를 지정해주시겠습니까? (미지정 시 최적화가 결정합니다)"
        text_vars:
          trip_count: "phase1.get('trip_count', 0)"
        type: numeric_optional
        param: total_duties
