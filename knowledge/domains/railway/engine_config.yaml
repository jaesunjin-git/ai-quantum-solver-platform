# ============================================================
# Railway 도메인 Engine 설정 Override
# ============================================================
# configs/engine_defaults.yaml의 플랫폼 공통 설정을 도메인에 맞게 override.
# 파라미터 값은 고객 데이터(params)에서 주입됨.
#
# 코드 모듈: domains.crew (crew scheduling 문제 유형)
# 지식팩: knowledge/domains/railway/
#
# 우선순위: params(고객) > 이 파일 > engine_defaults.yaml > dataclass 기본값
# ============================================================

# ── Column Generator ───────────────────────────────────────
generator:
  # ── 거점(Depot) 정책 ─────────────────────────────────────
  # type: multi(기본=자유) | single(완전분리) | hybrid(조건부)
  # single: 한 duty 내 거점 변경 불가 + 시작/종료 동일 거점
  # multi: 거점 제약 없음 (기존 동작, 단일거점 노선 호환)
  #
  # 주의: 거점 이름/소속 역 매핑은 여기가 아닌 고객 데이터에서 결정됨.
  #   - CSV 'depot' 컬럼 (최우선)
  #   - params의 depots 맵 (problem definition 단계)
  #   엔진은 depot 이름의 의미를 해석하지 않음 (opaque label).
  depot_policy:
    type: single
    enforce_round_trip_depot: true       # 출근 거점 = 퇴근 거점 (validator에서 체크)

    # segment별 depot rule — Engine은 segment 이름의 의미를 모름
    default_rule:
      trip_depot_mode: strict            # trip-level depot intersection 적용
      continuity_mode: strict            # 중간 경유도 동일 거점

    segment_rules:
      - segment: daytime
        trip_depot_mode: strict          # 주간: trip마다 거점 검증
        continuity_mode: strict          # 중간 경유도 같은 거점

      - segment: overnight
        trip_depot_mode: relaxed         # 야간: trip-level 필터 OFF (숙박 자유)
        continuity_mode: relaxed         # 중간 경유 거점 자유 (다대포/신평/노포 숙박)

  # Depot 인접역
  depot_suffixes:
    - "기지"

  # 야간 연결 마진
  evening_margin_minutes: 60
  evening_search_margin: 120
  rest_gap_margin_minutes: 30
  overnight_max_chain_ratio: 0.5

  # 야간 Cost 가중치
  night_idle_cost_weight: 0.015
  night_overhead_cost_weight: 0.005
  night_short_penalty_ratio: 0.5

  # Block Combine
  block_combine_enabled: false   # trip 밀도 낮은 노선에서 활성화
  block_combine_exclude_types:
    - overnight

# ── Column Feasibility Check ──────────────────────────────
# 도메인 카탈로그: "어떤 check가 존재하는가" + "어떤 파라미터를 참조하는가"
# action: 도메인 기본값. 고객별 Hard↔Soft 전환은 action_param으로 override.
feasibility:
  checks:
    # 유휴 대기시간 상한 (주간)
    - type: max_value
      field: idle_minutes
      limit_param: max_idle_time
      column_type: day                     # 주간 duty만 적용
      action: reject
      constraint_ref: max_wait_time_day

    # 유휴 대기시간 상한 (야간/숙박)
    - type: max_value
      field: idle_minutes
      limit_param: max_idle_time_night
      limit: 300                           # fallback: 주간과 동일
      column_type: [night, overnight]      # 야간/숙박 duty만 적용
      action: reject
      constraint_ref: max_wait_time_night

    # 활동시간(운전시간) 상한
    - type: max_value
      field: active_minutes
      limit_param: max_active_time
      action: reject
      constraint_ref: max_driving_time

    # 실근무 경과시간 상한
    - type: max_value
      field: elapsed_minutes
      limit_param: max_span_time
      action: reject
      constraint_ref: max_work_time

    # 체류시간 상한 (#15) — "가급적 12시간 이내" → soft
    - type: max_value
      field: span_minutes
      limit_param: max_total_stay_minutes
      limit: 720                            # fallback: 12시간
      action: penalize
      constraint_ref: max_total_stay_time

    # 식사 휴게시간 보장 (#17)
    - type: break_window
      windows:
        - start_param: meal_window_start
          start: 660                        # fallback: 11:00
          end_param: meal_window_end
          end: 840                          # fallback: 14:00
          min_gap_param: min_meal_break_minutes
          min_gap: 30                       # fallback: 30분
      action: reject
      constraint_ref: meal_break_guarantee

    # 강차 후 휴양시간 (#14)
    - type: min_turnaround
      min_gap_param: post_arrival_rest_minutes_min
      min_gap: 60                           # fallback: 60분
      action: penalize
      constraint_ref: post_arrival_rest

# ── Objective Builder ─────────────────────────────────────
# 현재: 플랫폼 기본값 사용 (override 없음)
# objective:
#   idle_penalty_weight: 0.005

# ── SP Side Constraints ───────────────────────────────────
side_constraints:
  # #2 사업평균 운전시간 제약 (soft — 선형화: Σ((active-target)*z) <= 0)
  - type: aggregate_avg
    column_field: active_minutes
    operator: "<="
    value_param: avg_driving_target_minutes
    value: 300                              # fallback: 5시간
    action: penalize
    constraint_ref: avg_driving_time_target

  # #11 사업 평균 실대기시간 제약 (soft)
  - type: aggregate_avg
    column_field: idle_minutes
    operator: "<="
    value_param: avg_wait_target_minutes
    value: 180                              # fallback: 3시간
    action: penalize
    constraint_ref: avg_wait_time_target

  # #16 교육시간 확보 — 13시 이전 강차 주간 duty가 10개 이상
  # last_trip_arr <= 780 (13:00) → 13~15시 교육 가능
  # type_filter: day — overnight 승무원은 야간 근무 후 휴식 대상이므로 제외
  - type: cardinality
    column_attribute: last_trip_arr
    type_filter: day
    threshold_param: post_trip_training_cutoff
    threshold: 780                          # fallback: 13:00
    threshold_operator: "<="
    operator: ">="
    value_param: min_training_duties
    value: 10                               # fallback: 10개
    action: penalize
    constraint_ref: post_shift_training
