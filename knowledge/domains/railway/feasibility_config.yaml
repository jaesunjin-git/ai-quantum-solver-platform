# ============================================================
# Railway 도메인 Column Feasibility Check (도메인 카탈로그)
# ============================================================
# "어떤 check가 존재하는가" + "어떤 파라미터를 참조하는가"를 선언.
# 파라미터 값은 고객 데이터(params)에서 주입됨.
#
# action 정책:
#   - action: 도메인 기본값 (reject = hard, penalize = soft)
#   - action_param: 고객별 override 가능 (constraint_policy 연동 시)
#   - 고객별로 Hard↔Soft 전환 필요 시 confirmed_problem에서 action을 override
#
# 우선순위: 이 파일 > feasibility_defaults.yaml (완전 대체)
# ============================================================

feasibility_checks:
  # ── 시간 상한 (Column Gen validation) ───────────────────────

  # 유휴 대기시간 상한
  - type: max_value
    field: idle_minutes
    limit_param: max_idle_time
    action: reject
    constraint_ref: max_wait_time_day

  # 활동시간(운전시간) 상한
  - type: max_value
    field: active_minutes
    limit_param: max_active_time
    action: reject
    constraint_ref: max_driving_time

  # 실근무 경과시간 상한
  - type: max_value
    field: elapsed_minutes
    limit_param: max_span_time
    action: reject
    constraint_ref: max_work_time

  # ── 식사 휴게시간 보장 (#17) ────────────────────────────────
  # 지정 시간대 내 최소 연속 공백 확보
  # 시간대/분수: 파라미터에서 주입 (고객별 노사협의에 따라 상이)
  - type: break_window
    windows:
      - start_param: meal_window_start
        start: 660                        # fallback: 11:00
        end_param: meal_window_end
        end: 840                          # fallback: 14:00
        min_gap_param: min_meal_break_minutes
        min_gap: 30                       # fallback: 30분
    action: reject
    constraint_ref: meal_break_guarantee

  # ── 강차 후 휴양시간 (#14) ──────────────────────────────────
  # 연속 trip 간 최소 간격
  - type: min_turnaround
    min_gap_param: post_arrival_rest_minutes_min
    min_gap: 60                           # fallback: 60분
    action: penalize
    constraint_ref: post_arrival_rest
