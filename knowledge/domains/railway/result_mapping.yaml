# result_mapping.yaml — Railway domain result interpretation config
#
# Externalizes objective patterns, constraint labels, solution variable
# semantics, and KPI definitions so the interpreter can be data-driven.

# ── Objective classification ──
objective_types:
  duty_count_min:
    patterns: ["sum(u[", "sum(y[", "minimize.*u[", "minimize.*y[", "min.*duty"]
    label_ko: "듀티 수 최소화"
    label_en: "Minimize Duty Count"
  cost_min:
    patterns: ["cost", "비용", "expense"]
    label_ko: "비용 최소화"
    label_en: "Minimize Cost"
  wait_min:
    patterns: ["wait", "대기", "idle"]
    label_ko: "대기시간 최소화"
    label_en: "Minimize Wait Time"
  time_min:
    patterns: ["time", "시간", "duration"]
    label_ko: "운행시간 최소화"
    label_en: "Minimize Time"

default_objective_label_ko: "목적함수 최적화"
default_objective_label_en: "Optimization Result"

# ── Solution variable semantics ──
# Maps solver output variable names to their roles
solution_variables:
  activation:
    key: "y"
    description: "듀티(승무원) 활성화 여부"
    type: binary
  assignment:
    key: "x"
    description: "트립→듀티 배정"
    type: binary
    indices: [trip, duty]
  start_time:
    key: "z"
    description: "듀티 시작 시각 (분)"
    type: continuous
  end_time:
    key: "w"
    description: "듀티 종료 시각 (분)"
    type: continuous

# ── Primary entity (what the solution "produces") ──
entity:
  name: "duty"
  label_ko: "듀티"
  label_en: "Duty"
  data_file: "normalized/trips.csv"
  data_fallback: "phase1/timetable_rows.csv"
  id_column: "trip_id"
  time_columns:
    departure: "trip_dep_time"
    arrival: "trip_arr_time"
    duration: "trip_duration"
  display_columns:
    - { field: "direction", label: "방향" }
    - { field: "dep_station", label: "출발역" }
    - { field: "arr_station", label: "도착역" }

# ── Parameter defaults (used when parameters.csv is unavailable) ──
parameter_defaults:
  prep_time_minutes: 40
  cleanup_time_minutes: 30
  max_driving_minutes: 360
  max_work_minutes: 660
  max_total_stay_minutes: 720

# ── Constraint labels (Korean display names) ──
constraint_labels:
  hard:
    trip_coverage: "트립 커버리지"
    crew_activation_linking: "승무원 활성화 연결"
    no_overlap: "트립 중복 금지"
    max_driving_time: "운전시간 상한"
    max_work_time: "근무시간 상한"
    max_wait_time: "대기시간 상한"
    preparation_time: "준비시간"
    cleanup_time: "정리시간"
    mandatory_break: "의무 휴식"
    meal_break_guarantee: "식사 휴식 보장"
  soft:
    avg_driving_time_target: "평균 운전시간 목표"
    avg_wait_time_target: "평균 대기시간 목표"
    max_total_stay_time: "최대 체류시간"
    night_duty_start_preferred: "야간 시작 권고"
    post_arrival_rest: "도착 후 휴식"
    post_shift_training: "교대 후 훈련"
    workload_balance: "업무량 균형"
    day_duty_start: "주간 시작 시각"
    day_duty_end: "주간 종료 시각"
    night_duty_start: "야간 시작 시각"
    day_night_classification: "주야 분류"
    night_sleep_guarantee: "야간 수면 보장"
    night_rest: "야간 휴식"

# ── Post-solve verification rules ──
# Result Interpreter가 duty 데이터를 기반으로 자동 검증.
# type:
#   structural: SP 모델 구조상 보장 (검증 불필요, 표시만)
#   parametric: duty 필드 vs 파라미터 비교
#   count:      위반 건수 집계
# condition: 특정 duty에만 적용 (예: overnight만)
constraint_verify:
  # ── Structural (SP 모델 보장) ──
  trip_coverage:
    type: structural
    guarantee_reason: "SP 모델에서 각 trip exactly once 포함"
  crew_activation_linking:
    type: structural
    guarantee_reason: "SP 모델에서 column 선택 시 자동 포함"
  crew_activation_reverse:
    type: structural
    guarantee_reason: "SP 모델에서 column 선택 시 자동 포함"
  no_overlap:
    type: structural
    guarantee_reason: "Column Gen에서 feasible column만 생성"
  preparation_time:
    type: structural
    guarantee_reason: "Column Gen에서 준비시간 포함하여 생성"
  cleanup_time:
    type: structural
    guarantee_reason: "Column Gen에서 정리시간 포함하여 생성"
  day_night_classification:
    type: structural
    guarantee_reason: "Column Gen에서 주야 분류 적용하여 생성"

  # ── Parametric (duty 필드 vs 파라미터) ──
  max_driving_time:
    type: parametric
    duty_field: total_driving_min
    operator: "<="
    param: max_driving_minutes
    aggregation: max
    unit: "분"
  max_work_time:
    type: parametric
    duty_field: total_work_min
    operator: "<="
    param: max_work_minutes
    aggregation: max
    unit: "분"
  max_wait_time_day:
    type: parametric
    duty_field: wait_minutes
    operator: "<="
    param: max_wait_minutes
    aggregation: max
    unit: "분"
    condition:
      duty_field: is_night
      equals: false
  max_wait_time_night:
    type: parametric
    duty_field: wait_minutes
    operator: "<="
    param: max_wait_minutes
    aggregation: max
    unit: "분"
    condition:
      duty_field: is_night
      equals: true
  max_total_stay_time:
    type: parametric
    duty_field: total_stay_min
    operator: "<="
    param: max_total_stay_minutes
    aggregation: max
    unit: "분"
  day_duty_start:
    type: parametric
    duty_field: start_time_min
    operator: ">="
    param: day_duty_start_earliest
    aggregation: min
    unit: "분"
    condition:
      duty_field: is_night
      equals: false
  day_duty_end:
    type: parametric
    duty_field: start_time_min
    operator: "<="
    param: day_duty_end_latest
    aggregation: max
    unit: "분"
    condition:
      duty_field: is_night
      equals: false
  night_sleep_guarantee:
    type: parametric
    duty_field: sleep_minutes
    operator: ">="
    param: min_night_sleep_minutes
    aggregation: min
    unit: "분"
    label_suffix: "(최소)"
    condition:
      duty_field: column_type
      in: [overnight]
  night_rest:
    type: parametric
    duty_field: sleep_minutes
    operator: ">="
    param: min_night_rest_total_minutes
    aggregation: min
    unit: "분"
    condition:
      duty_field: column_type
      in: [overnight]
  overnight_work_time_excluding_sleep:
    type: parametric
    duty_field: total_work_min
    operator: "<="
    param: max_work_minutes
    aggregation: max
    unit: "분"
    condition:
      duty_field: column_type
      in: [overnight]

  # ── Count (위반 건수 집계) ──
  mandatory_break:
    type: count
    check: max_inter_trip_gap
    operator: ">="
    param: min_break_minutes
    unit: "분"
  meal_break_guarantee:
    type: count
    check: max_inter_trip_gap
    operator: ">="
    param: min_meal_break_minutes
    unit: "분"
  fixed_total_duties:
    type: skip
  fixed_day_crew_count:
    type: skip
  fixed_night_crew_count:
    type: skip

# ── KPI definitions ──
# These define what KPIs are shown in the result dashboard
kpi:
  core:
    - id: active_duties
      label_ko: "활성 듀티 수"
      unit: "개"
    - id: total_trips
      label_ko: "전체 트립 수"
      unit: "개"
    - id: covered_trips
      label_ko: "배정된 트립 수"
      unit: "개"
    - id: coverage_rate
      label_ko: "커버리지율"
      unit: "%"
  efficiency:
    - id: avg_trips_per_duty
      label_ko: "듀티당 평균 트립"
      unit: "개"
    - id: driving_efficiency
      label_ko: "운전 효율"
      unit: "%"
    - id: avg_driving_per_duty
      label_ko: "듀티당 평균 운전시간"
      unit: "분"
    - id: avg_idle_per_duty
      label_ko: "듀티당 평균 대기시간"
      unit: "분"
  objective_specific:
    duty_count_min:
      - id: duty_reduction_vs_trips
        label_ko: "듀티 절감률"
        unit: "%"
      - id: earliest_start
        label_ko: "최초 시작 시각"
        unit: "HH:MM"
      - id: latest_end
        label_ko: "최종 종료 시각"
        unit: "HH:MM"

# ── Artifact definitions ──
artifacts:
  - id: solution
    filename_template: "solution_{solver_id}.json"
    format: json
  - id: interpretation
    filename_template: "interpretation_{solver_id}.json"
    format: json
  - id: duty_schedule
    filename_template: "duty_schedule_{solver_id}.csv"
    format: csv
    description: "듀티-트립 배정표"
  - id: kpi
    filename_template: "kpi_{solver_id}.json"
    format: json

# ── Objective display (목적함수별 사용자 표시 설정) ──
# label_ko: 화면에 표시할 라벨
# value_source: KPI 필드 (dotted key) 또는 "objective_value"
# value_suffix: 단위 접미사
# direction: 최적화 방향 안내
objective_display:
  minimize_duties:
    label_ko: "최소 승무원 수"
    value_source: "kpi.active_duties"
    value_suffix: "조"
    direction: "낮을수록 좋음"
  duty_count_min:
    label_ko: "최소 승무원 수"
    value_source: "kpi.active_duties"
    value_suffix: "조"
    direction: "낮을수록 좋음"
  minimize_duties_with_penalties:
    label_ko: "최소 승무원 수 (페널티 포함)"
    value_source: "kpi.active_duties"
    value_suffix: "조"
    direction: "낮을수록 좋음"
  balance_workload:
    label_ko: "워크로드 균형"
    value_source: "kpi.max_min_trip_gap"
    value_suffix: "trips 편차"
    direction: "낮을수록 균등"
  maximize_efficiency:
    label_ko: "운전 효율"
    value_source: "kpi.driving_efficiency"
    value_suffix: "%"
    direction: "높을수록 좋음"
  minimize_cost:
    label_ko: "총 비용"
    value_source: "objective_value"
    value_suffix: ""
    direction: "낮을수록 좋음"
