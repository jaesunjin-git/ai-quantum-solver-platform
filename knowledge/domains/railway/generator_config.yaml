# ============================================================
# Crew Scheduling 도메인 전용 Generator 튜닝 파라미터
# ============================================================
# configs/generator_defaults.yaml의 범용 값을 도메인에 맞게 override.
# 사용자 운영 제약(night_threshold 등)은 parameters.csv에서 설정합니다.
#
# 우선순위: params(사용자) > 이 파일 > generator_defaults.yaml > dataclass 기본값
# ============================================================

# ── Depot 인접역 ─────────────────────────────────────────────
depot_suffixes:
  - "기지"

# ── 야간 연결 마진 ───────────────────────────────────────────
evening_margin_minutes: 60       # night_threshold 전 마진 (_classify_gaps 수면 판정)
evening_search_margin: 120       # evening chain 탐색 범위 (night_threshold - 이 값)
rest_gap_margin_minutes: 30      # 수면 gap 판단 마진 (분)
overnight_max_chain_ratio: 0.5   # overnight chain 최대 길이 (max_tasks 대비)

# ── 야간 Cost 가중치 ─────────────────────────────────────────
night_idle_cost_weight: 0.015    # 야간 유휴 비용 계수
night_overhead_cost_weight: 0.005 # 야간 오버헤드 비용 계수
night_short_penalty_ratio: 0.5   # 야간 short penalty 비율 (base의 50%)

# ── Block Combine (DIA 정답: 주간 block-gap-block 구조) ─────
block_combine_enabled: false     # OFF — solver가 선택하지 않음 (objective 튜닝 후 재활성화)
# max_gap: 0 → max_idle_time(params)에서 자동 도출
# top_k: 0 → max_columns_target*0.3에서 자동 도출
block_combine_exclude_types:     # block 결합 제외 column type
  - overnight
