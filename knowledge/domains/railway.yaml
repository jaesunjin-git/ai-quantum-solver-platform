version: '1.0'
domain: railway
name_ko: 철도
name_en: Railway
detection_keywords:
- - 철도
  - 열차
  - train
  - railway
  - rail
- - 역
  - station
  - 정거장
  - 터미널
- - 노선
  - line
  - route
  - 구간
- - DIA
  - 다이아
  - 운행도표
- - 기관사
  - 승무원
  - 차장
  - conductor
sub_domains:
  urban_metro:
    name_ko: 도시철도 / 지하철
    detection_keywords:
    - 지하철
    - 도시철도
    - metro
    - subway
    - 경전철
    characteristics:
    - high frequency, short headway
    - fixed routes with defined termini
    - typically bidirectional single-line
  high_speed:
    name_ko: 고속철도
    detection_keywords:
    - KTX
    - 고속
    - high-speed
    - HSR
    - SRT
    characteristics:
    - long-distance, fewer stops
    - complex crew base assignments
    - meal break requirements critical
  conventional:
    name_ko: 일반 여객철도
    detection_keywords:
    - 무궁화
    - 새마을
    - ITX
    - 일반열차
    characteristics:
    - mixed express and local services
    - multi-line crew sharing possible
  freight:
    name_ko: 화물철도
    detection_keywords:
    - 화물
    - freight
    - cargo
    - 컨테이너
    characteristics:
    - irregular schedules
    - tonnage-based constraints
problem_variants:
  duty_generation:
    single_line_bidirectional:
      name_ko: 단일노선 양방향 듀티 생성
      description: '하나의 노선에서 상행/하행 열차를 조합하여 승무 듀티를 생성한다.

        '
      detection_hints:
      - exactly 2 termini (e.g., station A and station B)
      - direction column with UP/DOWN or 상행/하행
      - single line identifier
      typical_decision_variables:
      - x[d] = 1 if duty d is selected
      - y[t,d] = 1 if trip t is assigned to duty d
      example_objectives:
      - minimize total number of duties
      - minimize total deadhead time
      - minimize total work time
    single_line_unidirectional:
      name_ko: 단일노선 단방향 듀티 생성
      description: '한 방향만 운행하는 구간의 듀티 생성.

        '
      detection_hints:
      - trips only in one direction
      - crew repositioning required
    multi_line:
      name_ko: 다중노선 듀티 생성
      description: '여러 노선의 열차를 통합하여 듀티를 생성한다.

        '
      detection_hints:
      - multiple line identifiers
      - 3+ termini
      - cross-line transfers possible
    circular_line:
      name_ko: 순환노선 듀티 생성
      description: '순환 노선(예: 환상선)에서의 듀티 생성.

        '
      detection_hints:
      - no fixed termini
      - loop or circular route pattern
  roster_assignment:
    cyclic_roster:
      name_ko: 순환 로스터 배정
      description: 교번을 일정 주기로 순환 배정
    individual_roster:
      name_ko: 개별 로스터 배정
      description: 개인별 최적 로스터 배정
constraints:
  hard:
    trip_coverage:
      name_ko: 운행 커버리지
      description: 모든 열차 운행은 정확히 하나의 듀티에 배정
      parameter: null
      formulation: sum(y[t,d] for d) == 1 for all t
    max_driving_time:
      name_ko: 최대 승무시간
      description: 하나의 듀티에서 실제 운전(승무) 시간 상한
      parameter: max_driving_minutes
      unit: minutes
      typical_range:
      - 240
      - 420
      formulation: driving_time[d] <= max_driving_minutes
    max_work_time:
      name_ko: 최대 근무시간
      description: 준비-승무-정리를 포함한 총 근무시간 상한
      parameter: max_work_minutes
      unit: minutes
      typical_range:
      - 480
      - 720
      formulation: work_time[d] <= max_work_minutes
    mandatory_break:
      name_ko: 필수 휴식
      description: 연속 승무 후 최소 식사·휴식 시간
      parameter: min_break_minutes
      unit: minutes
      typical_range:
      - 30
      - 60
      formulation: break_time[d] >= min_break_minutes if continuous_drive > threshold
    night_rest:
      name_ko: 야간 휴식
      description: 야간 근무 후 최소 연속 휴식
      parameter: night_rest_minutes
      unit: minutes
      typical_range:
      - 240
      - 480
    prep_cleanup:
      name_ko: 준비/정리 시간
      description: 근무 시작 전 준비, 종료 후 정리 시간
      parameters:
        prep_time_minutes:
          typical_range:
          - 20
          - 60
        cleanup_time_minutes:
          typical_range:
          - 20
          - 60
    big_m_constant:
      name_ko: Big-M 상수
      description: 선형화에 사용하는 충분히 큰 수 (1일=1440분)
      parameter: M
      unit: minutes
      typical_range:
      - 1440
      - 2880
      formulation: linearization constant for min/max time constraints
    qualification:
      name_ko: 자격 요건
      description: 승무원 자격이 해당 노선/열차 요건과 일치
      parameter: null
      formulation: assign only if crew qualifies for the line/train type
    max_total_stay_time:
      name_ko: 최대 체류시간
      description: 회사 내 총 체류시간(출근~퇴근) 상한
      parameter: max_total_stay_time
      unit: minutes
      typical_range:
      - 600
      - 720
      formulation: w[d] - z[d] <= max_total_stay_time for all d
    max_wait_time:
      name_ko: 최대 대기시간
      description: 듀티 내 1회 인정대기시간 상한
      parameter: max_wait_time_in_duty
      unit: minutes
      typical_range:
      - 120
      - 180
      formulation: wait_time_segment <= max_wait_time_in_duty
    min_wait_time:
      name_ko: 최소 대기시간
      description: 듀티 내 평균 대기시간 하한(실대기 기준)
      parameter: min_wait_time_in_duty
      unit: minutes
      typical_range:
      - 0
      - 180
      formulation: avg_wait_time[d] >= min_wait_time_in_duty (soft guide)
  soft:
    workload_balance:
      name_ko: 업무량 균형
      description: 듀티 간 근무시간 편차 최소화
      weight_range:
      - 0.1
      - 1.0
    minimize_deadhead:
      name_ko: 공차회송 최소화
      description: 비운행 이동(회송) 시간 최소화
      weight_range:
      - 0.1
      - 1.0
    minimize_split_duties:
      name_ko: 분리근무 최소화
      description: 중간에 긴 대기가 있는 분리근무 최소화
      weight_range:
      - 0.1
      - 0.5
    depot_proximity:
      name_ko: 사업소 근접성
      description: 근무 시작/종료지가 소속 사업소에 가까울수록 유리
      weight_range:
      - 0.05
      - 0.3
    preference_satisfaction:
      name_ko: 선호도 반영
      description: 승무원의 근무 선호를 가능한 반영
      weight_range:
      - 0.05
      - 0.2
reference_values:
  korean_urban_rail:
    max_driving_minutes: 360
    max_work_minutes: 660
    prep_time_minutes: 40
    cleanup_time_minutes: 40
    min_break_minutes: 40
    night_rest_minutes: 360
    typical_duty_count_range:
    - 30
    - 80
    max_total_stay_time: 720
    M: 1440
    max_wait_time_in_duty: 180
    min_wait_time_in_duty: 180
  korean_conventional_rail:
    max_driving_minutes: 420
    max_work_minutes: 720
    prep_time_minutes: 60
    cleanup_time_minutes: 60
    min_break_minutes: 45
    night_rest_minutes: 480
    max_total_stay_time: 720
    M: 1440
    max_wait_time_in_duty: 180
    min_wait_time_in_duty: 180
data_columns:
  trips_csv:
    source_file: normalized/trips.csv
    columns:
      trip_id: 운행 고유 ID
      trip_dep_time: 출발 시각(분)
      trip_arr_time: 도착 시각(분)
      trip_duration: 운행 소요시간(분) = arr_time - dep_time
      direction: 운행 방향(상행/하행)
      start_station: 출발역
      end_station: 도착역
    note: '이 컬럼들은 sum의 coeff에서 source_column으로 참조해야 하며, parameters 배열에 별도 항목으로 정의하면
      안 됩니다.

      '
  deadhead:
    description: '공차회송 시간(deadhead_time)은 두 운행 사이의 이동시간으로, trips.csv의 시각 데이터에서 계산해야
      합니다. 별도 파라미터로 정의하지 마세요.

      '
constraint_templates:
  _note: LLM은 이 JSON 구조를 그대로 constraints 배열에 넣어야 합니다. 변수/파라미터 이름을 임의로 바꾸지 마세요.
  trip_coverage:
    name: trip_coverage
    description: 모든 운행은 정확히 하나의 듀티에 배정
    for_each: i in I
    lhs:
      sum:
        var: y
        index: '[i,d]'
        over: d in D
        coeff: null
    operator: ==
    rhs:
      value: 1
    category: hard
    expression: sum(y[i,d] for d in D) == 1
  duty_assignment_limit:
    name: duty_assignment_limit
    description: 활성 듀티는 정확히 1명의 승무원에게 배정
    for_each: d in D
    lhs:
      sum:
        var: x
        index: '[j,d]'
        over: j in J
        coeff: null
    operator: ==
    rhs:
      var:
        name: u
        index: '[d]'
    category: hard
    expression: sum(x[j,d] for j in J) == u[d]
  max_driving_time:
    name: max_driving_time
    description: 듀티 내 총 승무(운전)시간이 상한 이하
    for_each: d in D
    lhs:
      sum:
        var: y
        index: '[i,d]'
        over: i in I
        coeff:
          param:
            name: travel_time_min
            index: '[i]'
            source_column: travel_time_min
            source_file: normalized/trips.csv
    operator: <=
    rhs:
      param:
        name: max_driving_minutes
        index: null
    category: hard
    expression: sum(travel_time_min[i] * y[i,d] for i in I) <= max_driving_minutes
  max_work_time:
    name: max_work_time
    description: 준비+승무+정리 포함 총 근무시간 상한
    for_each: d in D
    lhs:
      add:
      - sum:
          var: y
          index: '[i,d]'
          over: i in I
          coeff:
            param:
              name: travel_time_min
              index: '[i]'
              source_column: travel_time_min
              source_file: normalized/trips.csv
      - param:
          name: prep_time_minutes
          index: null
      - param:
          name: cleanup_time_minutes
          index: null
    operator: <=
    rhs:
      param:
        name: max_work_minutes
        index: null
    category: hard
    expression: sum(travel_time_min[i]*y[i,d] for i in I) + prep_time_minutes + cleanup_time_minutes
      <= max_work_minutes
  max_total_stay_time:
    name: max_total_stay_time
    description: 듀티의 총 체류시간(최초출발~최종도착+정리) 상한
    for_each: d in D
    lhs:
      subtract:
      - var:
          name: w
          index: '[d]'
      - var:
          name: z
          index: '[d]'
    operator: <=
    rhs:
      param:
        name: max_total_stay_time
        index: null
    category: hard
    expression: w[d] - z[d] <= max_total_stay_time
    requires_variables:
    - z (integer, indices=[D], 듀티 시작시각 분)
    - w (integer, indices=[D], 듀티 종료시각 분)
  duty_start_time:
    name: duty_start_time
    description: 듀티 시작시각 = 배정된 운행 중 최소 출발시각 - 준비시간
    for_each: d in D
    _note: Big-M 또는 min 선형화 필요. z[d] <= dep_time_min[i] - prep_time + M*(1-y[i,d])
    lhs:
      var:
        name: z
        index: '[d]'
    operator: <=
    rhs:
      add:
      - param:
          name: dep_time_min
          index: '[i]'
          source_column: dep_time_min
          source_file: normalized/trips.csv
      - multiply:
        - value: -1
        - param:
            name: prep_time_minutes
            index: null
      - multiply:
        - param:
            name: M
            index: null
        - subtract:
          - value: 1
          - var:
              name: y
              index: '[i,d]'
    category: hard
    expression: z[d] <= dep_time_min[i] - prep_time_minutes + M*(1-y[i,d]) for all
      i
    requires_variables:
    - z (integer, indices=[D])
  duty_end_time:
    name: duty_end_time
    description: 듀티 종료시각 = 배정된 운행 중 최대 도착시각 + 정리시간
    for_each: d in D
    _note: Big-M 선형화. w[d] >= arr_time_min[i] + cleanup_time - M*(1-y[i,d])
    lhs:
      var:
        name: w
        index: '[d]'
    operator: '>='
    rhs:
      subtract:
      - add:
        - param:
            name: arr_time_min
            index: '[i]'
            source_column: arr_time_min
            source_file: normalized/trips.csv
        - param:
            name: cleanup_time_minutes
            index: null
      - multiply:
        - param:
            name: M
            index: null
        - subtract:
          - value: 1
          - var:
              name: y
              index: '[i,d]'
    category: hard
    expression: w[d] >= arr_time_min[i] + cleanup_time_minutes - M*(1-y[i,d]) for
      all i
    requires_variables:
    - w (integer, indices=[D])
  minimize_duties_objective:
    _type: objective_template
    type: minimize
    description: 사용되는 듀티 수 최소화
    expression:
      sum:
        var: u
        index: '[d]'
        over: d in D
        coeff: null
    requires_variables:
    - u (binary, indices=[D], 듀티 d가 사용되면 1)
    alternatives:
    - type: minimize
      description: 총 근무시간 최소화
    - type: minimize
      description: 공차회송 최소화
  duty_activation:
    name: duty_activation
    description: 듀티에 운행이 배정되면 해당 듀티는 활성화됨
    for_each: i in I, d in D
    lhs:
      var:
        name: y
        index: '[i,d]'
    operator: <=
    rhs:
      var:
        name: u
        index: '[d]'
    category: hard
    expression: y[i,d] <= u[d]
    requires_variables:
    - u (binary, indices=[D])
  time_compatibility:
    name: time_compatibility
    description: 같은 듀티 내 두 운행이 시간적으로 양립 불가하면 함께 배정 불가
    _note: 운행 i의 도착시각이 운행 j의 출발시각보다 늦으면 같은 듀티에 배정 불가. y[i,d] + y[j,d] <= 1 for incompatible
      pairs.
    for_each: d in D
    implementation: pairwise_incompatibility
    condition: arr_time_min[i] > dep_time_min[j] AND arr_time_min[j] > dep_time_min[i]
    lhs:
      add:
      - var:
          name: y
          index: '[i,d]'
      - var:
          name: y
          index: '[j,d]'
    operator: <=
    rhs:
      value: 1
    category: hard
    expression: y[i,d] + y[j,d] <= 1 for overlapping trips i,j
