# ============================================================
# Engine 설정 기본값 — crew_scheduling problem type
# ============================================================
# 이 파일은 crew scheduling (승무원 스케줄링) 문제 유형의 engine 기본값입니다.
# 플랫폼 공통 설정이 아닙니다. 다른 problem type (material_optimization 등)은
# 별도의 engine_defaults를 가집니다.
#
# 도메인별 override: knowledge/domains/{name}/engine_config.yaml
#   예: railway 도메인은 railway/engine_config.yaml에서 이 값을 override
#
# 로딩 계층: problem_type 기본값 → 산업 도메인 override → 고객(tenant) override
#
# 구조:
#   generator:       Column Generator 튜닝 파라미터
#   feasibility:     Column Feasibility Check 파이프라인
#   objective:       Objective Builder 가중치
#   side_constraints: SP Side Constraint
# ============================================================

# ── Column Generator ───────────────────────────────────────
generator:
  # 운영 제약 (사용자 params가 1순위, 여기는 2순위 기본값)
  max_active_time: 360          # 최대 활동시간 (분)
  avg_active_target: 300        # 목표 평균 활동시간
  max_span_time: 660            # 최대 경과시간 (시작~종료)
  max_idle_time: 300            # 최대 유휴시간
  setup_time: 60                # 준비시간
  teardown_time: 40             # 정리시간
  min_pause_time: 30            # 최소 휴식시간
  max_gap: 60                   # task 간 최대 연결 간격
  max_tasks: 10                 # column당 최대 task 수

  # Beam Search
  beam_width: 50
  max_columns_target: 100000
  time_group_minutes: 120
  span_estimate_multiplier: 1.5

  # Beam Score 가중치
  task_count_score_weight: 100
  depth_bonus_score: 50

  # Cost 가중치
  idle_cost_weight: 0.02
  overhead_cost_weight: 0.01
  short_column_cost_weight: 0.05
  depth_penalty_cost_weight: 0.3
  greedy_cost_multiplier: 1.5
  fallback_cost: 10.0

  # Diversity (Adaptive CG)
  diversity_weight: 100.0
  min_per_diversity_bucket: 5
  min_task_coverage: 10

  # Block Combine (block-gap-block)
  block_combine_enabled: false
  block_combine_max_gap: 0
  block_combine_per_block: 5
  block_combine_score_penalty: 0.7
  block_combine_top_k: 0
  block_combine_max_active_ratio: 0.5
  block_combine_min_trips: 2

  # Single Task Fallback
  single_task_max_windows: 1
  fallback_include_pause: true

  # 시간 상수
  day_minutes: 1440

# ── Column Feasibility Check ──────────────────────────────
# 도메인 YAML에 feasibility.checks가 있으면 이 섹션을 완전 대체.
# 파라미터 참조: _param 접미사 → params에서 조회, 없으면 직접 값 사용.
feasibility:
  checks:
    - type: max_value
      field: idle_minutes
      limit_param: max_idle_time
      action: reject

    - type: max_value
      field: active_minutes
      limit_param: max_active_time
      action: reject

    - type: max_value
      field: elapsed_minutes
      limit_param: max_span_time
      action: reject

# ── Objective Builder ─────────────────────────────────────
objective:
  duty_weight: 1.0
  short_penalty_weight: 0.05
  idle_penalty_weight: 0.01
  balance_penalty_weight: 0.5
  short_threshold: 8

# ── SP Side Constraints (Phase 2) ─────────────────────────
side_constraints: []
